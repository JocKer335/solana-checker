<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Web3 Activity Checker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root {
  --bg: #06080f;
  --bg2: rgba(11,15,26,0.85);
  --bg3: rgba(18,24,40,0.7);
  --border: rgba(139,92,246,0.1);
  --border2: rgba(139,92,246,0.22);
  --text: #dde6f5;
  --muted: #48577a;
  --muted2: #7a90b8;
  --green: #00e5a0;
  --green-bg: rgba(0,229,160,0.07);
  --green-border: rgba(0,229,160,0.22);
  --amber: #ffc43d;
  --amber-bg: rgba(255,196,61,0.07);
  --amber-border: rgba(255,196,61,0.22);
  --red: #ff4d6a;
  --red-bg: rgba(255,77,106,0.07);
  --blue: #60a5fa;
  --blue-bg: rgba(96,165,250,0.07);
  --blue-border: rgba(96,165,250,0.22);
  --purple: #a78bfa;
  --purple-bg: rgba(167,139,250,0.08);
  --purple-border: rgba(167,139,250,0.25);
  --orange: #fb923c;
  --orange-bg: rgba(251,146,60,0.07);
  --orange-border: rgba(251,146,60,0.22);
  --pink: #f472b6;
  --pink-bg: rgba(244,114,182,0.07);
  --pink-border: rgba(244,114,182,0.22);
}

/* ── LIGHT THEME ── */
html.light {
  --bg: #f0f2f8;
  --bg2: rgba(255,255,255,0.92);
  --bg3: rgba(241,244,252,0.9);
  --border: rgba(100,116,180,0.13);
  --border2: rgba(100,116,180,0.22);
  --text: #1a2140;
  --muted: #8090b8;
  --muted2: #5060a0;
  --green: #059669;
  --green-bg: rgba(5,150,105,0.08);
  --green-border: rgba(5,150,105,0.22);
  --amber: #d97706;
  --amber-bg: rgba(217,119,6,0.08);
  --amber-border: rgba(217,119,6,0.22);
  --red: #dc2626;
  --red-bg: rgba(220,38,38,0.07);
  --blue: #2563eb;
  --blue-bg: rgba(37,99,235,0.07);
  --blue-border: rgba(37,99,235,0.2);
  --purple: #7c3aed;
  --purple-bg: rgba(124,58,237,0.07);
  --purple-border: rgba(124,58,237,0.2);
  --pink: #db2777;
  --pink-bg: rgba(219,39,119,0.07);
  --pink-border: rgba(219,39,119,0.2);
}

*{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition:background 0.35s,color 0.35s;
  position:relative;
}

/* Ambient mesh gradient */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 10%, rgba(139,92,246,0.11) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 85% 85%, rgba(6,182,212,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(16,185,129,0.04) 0%, transparent 60%);
  pointer-events:none;
  z-index:0;
}
html.light body::before {
  background:
    radial-gradient(ellipse 60% 50% at 15% 10%, rgba(167,139,250,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 85% 85%, rgba(6,182,212,0.05) 0%, transparent 70%);
}
body > * { position:relative; z-index:1; }

/* ── HEADER ── */
.header {
  padding:18px 28px 0;
  background:rgba(6,8,15,0.72);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:50;
}
html.light .header { background:rgba(240,242,248,0.84); }

.header-top { display:flex; align-items:center; gap:14px; margin-bottom:12px; }

.logo {
  width:38px;
  height:38px;
  background:linear-gradient(135deg, rgba(139,92,246,0.28), rgba(6,182,212,0.18));
  border:1px solid var(--purple-border);
  border-radius:11px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  box-shadow:0 0 18px rgba(139,92,246,0.18), inset 0 1px 0 rgba(255,255,255,0.08);
  flex-shrink:0;
}

.header h1 {
  font-size:19px;
  font-weight:700;
  letter-spacing:-0.3px;
  background:linear-gradient(135deg, #dde6f5 25%, #a78bfa 70%, #60a5fa 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.header p {
  font-size:11.5px;
  color:var(--muted);
  margin-left:52px;
  margin-bottom:8px;
  letter-spacing:0.1px;
}

.save-pill {
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  color:var(--green);
  background:var(--green-bg);
  border:1px solid var(--green-border);
  border-radius:20px;
  padding:3px 11px;
  margin-left:52px;
  margin-bottom:10px;
}
.save-pill .dot {
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--green);
  animation:pulse 2.2s infinite;
  box-shadow:0 0 6px var(--green);
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}

/* ── TABS ── */
.tabs { display:flex; gap:3px; overflow-x:auto; padding:8px 0 0; }
.tabs::-webkit-scrollbar{display:none;}

.tab {
  display:flex;
  align-items:center;
  gap:7px;
  padding:8px 16px;
  font-size:12.5px;
  font-weight:500;
  cursor:pointer;
  color:var(--muted2);
  background:transparent;
  border:1px solid transparent;
  border-bottom:none;
  border-radius:10px 10px 0 0;
  margin-bottom:-1px;
  white-space:nowrap;
  transition:all 0.2s;
  position:relative;
}
.tab:hover { color:var(--text); background:rgba(139,92,246,0.05); }
.tab.active {
  color:var(--text);
  background:rgba(139,92,246,0.09);
  border-color:var(--border2);
  box-shadow:0 -1px 14px rgba(139,92,246,0.11), inset 0 1px 0 rgba(255,255,255,0.05);
}
.tab.active::after {
  content:'';
  position:absolute;
  bottom:-1px;
  left:0;
  right:0;
  height:1px;
  background:var(--bg);
}
html.light .tab.active::after { background:#f0f2f8; }
.tab-dot { width:8px; height:8px; border-radius:50%; box-shadow:0 0 5px currentColor; }
.tab-count {
  font-size:10px;
  background:var(--bg3);
  padding:2px 7px;
  border-radius:20px;
  color:var(--muted);
  border:1px solid var(--border);
}
.tab.active .tab-count { background:var(--purple-bg); color:var(--purple); border-color:var(--purple-border); }

/* ── MAIN ── */
.main{padding:24px 28px;}
.panel{display:none;}
.panel.active{display:block;}

/* ── STAT CARDS ── */
.stats-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
.stat-card {
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 20px;
  flex:1;
  min-width:100px;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  position:relative;
  overflow:hidden;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.stat-card:hover { border-color:var(--border2); box-shadow:0 4px 24px rgba(139,92,246,0.08); }
.stat-card::before {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.025) 0%, transparent 55%);
  pointer-events:none;
  border-radius:inherit;
}
.stat-card .label {
  font-size:10.5px;
  color:var(--muted);
  margin-bottom:5px;
  text-transform:uppercase;
  letter-spacing:0.7px;
  font-weight:600;
}
.stat-card .value {
  font-size:26px;
  font-weight:700;
  color:var(--text);
  letter-spacing:-0.5px;
  line-height:1;
}
.stat-card.green .value  { color:var(--green); text-shadow:0 0 16px rgba(0,229,160,0.3); }
.stat-card.amber .value  { color:var(--amber); text-shadow:0 0 16px rgba(255,196,61,0.25); }
.stat-card.red .value    { color:var(--red); }
.stat-card.blue .value   { color:var(--blue); text-shadow:0 0 16px rgba(96,165,250,0.25); }

/* ── PROGRESS ── */
.progress-wrap{margin-bottom:20px;}
.progress-track { height:3px; background:var(--bg3); border-radius:2px; overflow:hidden; }
.progress-fill {
  height:100%;
  border-radius:2px;
  transition:width 0.5s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 8px currentColor;
}
.progress-label{font-size:11px;color:var(--muted);margin-top:6px;}

/* ── TOOLBAR ── */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.toolbar input,.toolbar select {
  font-size:13px;
  padding:8px 13px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--bg2);
  color:var(--text);
  outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
  backdrop-filter:blur(8px);
  font-family:inherit;
}
.toolbar input{flex:1;min-width:180px;}
.toolbar input:focus,.toolbar select:focus {
  border-color:var(--purple-border);
  box-shadow:0 0 0 3px rgba(167,139,250,0.1);
}

/* ── BUTTONS ── */
.btn {
  font-size:12px;
  padding:8px 14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--bg2);
  cursor:pointer;
  color:var(--muted2);
  transition:all 0.2s;
  white-space:nowrap;
  backdrop-filter:blur(8px);
  font-family:inherit;
}
.btn:hover { border-color:var(--border2); color:var(--text); background:var(--bg3); box-shadow:0 2px 12px rgba(0,0,0,0.18); }
.btn-purple { color:var(--purple); border-color:var(--purple-border); background:var(--purple-bg); }
.btn-purple:hover { background:rgba(167,139,250,0.14); box-shadow:0 0 16px rgba(167,139,250,0.14); }
.btn-green { color:var(--green); border-color:var(--green-border); background:var(--green-bg); }
.btn-green:hover { background:rgba(0,229,160,0.12); box-shadow:0 0 14px rgba(0,229,160,0.14); }
.btn-red { color:var(--red); border-color:rgba(255,77,106,0.28); }
.btn-red:hover { background:var(--red-bg); }

/* ── ADD BOX ── */
.add-box {
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px 18px;
  margin-bottom:20px;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.add-box-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; font-size:13px; font-weight:600; }
.add-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.add-row input {
  flex:1;
  min-width:140px;
  font-size:13px;
  padding:8px 12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:var(--text);
  outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
  font-family:inherit;
}
.add-row input:focus { border-color:var(--purple-border); box-shadow:0 0 0 3px rgba(167,139,250,0.1); }
.add-row label {
  font-size:12px;
  padding:8px 14px;
  border-radius:10px;
  border:1px solid var(--blue-border);
  color:var(--blue);
  cursor:pointer;
  transition:all 0.2s;
  background:var(--blue-bg);
  font-family:inherit;
}
.add-row label:hover { background:rgba(96,165,250,0.14); }
.add-row input[type="file"]{display:none;}
.hint{font-size:11px;color:var(--muted);margin-top:8px;}
.hint code{background:var(--bg3);padding:2px 7px;border-radius:5px;color:var(--muted2);font-size:10px;border:1px solid var(--border);}

/* ── BULK ── */
.bulk-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}

/* ── TABLE ── */
.table-wrap {
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  margin-bottom:10px;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  box-shadow:0 4px 32px rgba(0,0,0,0.22);
}
.table-scroll{max-height:540px;overflow-y:auto;}
.table-scroll::-webkit-scrollbar{width:3px;}
.table-scroll::-webkit-scrollbar-track{background:transparent;}
.table-scroll::-webkit-scrollbar-thumb{background:rgba(139,92,246,0.3);border-radius:2px;}

table{width:100%;border-collapse:collapse;font-size:13px;}
thead{position:sticky;top:0;z-index:10;}
thead th {
  text-align:left;
  padding:11px 14px;
  font-size:10.5px;
  font-weight:600;
  color:var(--muted);
  background:rgba(18,24,40,0.96);
  text-transform:uppercase;
  letter-spacing:0.7px;
  border-bottom:1px solid var(--border);
}
html.light thead th { background:rgba(241,244,252,0.98); }

tbody tr { border-bottom:1px solid rgba(139,92,246,0.05); transition:background 0.15s; }
tbody tr:nth-child(even) { background:rgba(139,92,246,0.018); }
tbody tr:hover { background:rgba(167,139,250,0.05); }
tbody tr:last-child{border-bottom:none;}
td{padding:10px 14px;vertical-align:middle;}

.cell-name{font-weight:600;color:var(--text);font-size:13px;}
.cell-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.cell-link{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}

/* ── LINKS ── */
.xl {
  color:var(--blue);
  text-decoration:none;
  font-size:11px;
  display:flex;
  align-items:center;
  gap:4px;
  padding:3px 9px;
  border-radius:6px;
  border:1px solid var(--blue-border);
  background:var(--blue-bg);
  white-space:nowrap;
  transition:all 0.15s;
  font-weight:500;
}
.xl:hover { background:rgba(96,165,250,0.15); box-shadow:0 0 10px rgba(96,165,250,0.18); }
.xl-text{font-size:10.5px;}
.xl-edit {
  background:transparent;
  border:none;
  cursor:pointer;
  color:var(--muted);
  padding:3px 7px;
  border-radius:6px;
  font-size:11px;
  transition:all 0.15s;
}
.xl-edit:hover{color:var(--text);background:var(--bg3);}
.xl-none{font-size:11px;color:var(--muted);font-style:italic;opacity:0.6;}

/* ── BADGES ── */
.badge {
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:4px 11px;
  border-radius:20px;
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  border:1px solid transparent;
  transition:all 0.18s;
  letter-spacing:0.1px;
  white-space:nowrap;
}
.badge:hover { filter:brightness(1.15); transform:translateY(-1px); }
.badge:active { transform:translateY(0); }

.badge-active {
  background:rgba(0,229,160,0.1);
  color:var(--green);
  border-color:var(--green-border);
  box-shadow:0 0 12px rgba(0,229,160,0.12);
}
.badge-inactive {
  background:var(--bg3);
  color:var(--muted2);
  border-color:var(--border);
}
.badge-pending {
  background:rgba(255,196,61,0.08);
  color:var(--amber);
  border-color:var(--amber-border);
  box-shadow:0 0 10px rgba(255,196,61,0.1);
}
.badge-contacted {
  background:var(--blue-bg);
  color:var(--blue);
  border-color:var(--blue-border);
  box-shadow:0 0 10px rgba(96,165,250,0.1);
}
.badge-notcontacted {
  background:var(--red-bg);
  color:var(--red);
  border-color:rgba(255,77,106,0.25);
}
.badge-contactpending {
  background:var(--amber-bg);
  color:var(--amber);
  border-color:var(--amber-border);
}

.del-btn {
  background:transparent;
  border:none;
  cursor:pointer;
  color:var(--muted);
  padding:5px 9px;
  border-radius:7px;
  font-size:15px;
  transition:all 0.15s;
  line-height:1;
}
.del-btn:hover{color:var(--red);background:var(--red-bg);}
.num{color:var(--muted);font-size:11px;width:30px;font-variant-numeric:tabular-nums;}

/* ── HANDLES / LEGEND ── */
.handles{display:flex;flex-wrap:wrap;gap:4px;}
.legend{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.leg-dot{width:7px;height:7px;border-radius:50%;}

/* ── MODAL ── */
.modal-overlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:100;
  align-items:center;
  justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal {
  background:rgba(11,15,26,0.96);
  border:1px solid var(--border2);
  border-radius:18px;
  padding:26px;
  width:440px;
  max-width:92vw;
  box-shadow:0 24px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  animation:modalIn 0.22s cubic-bezier(.34,1.56,.64,1);
}
html.light .modal { background:rgba(255,255,255,0.98); }
@keyframes modalIn{from{opacity:0;transform:scale(0.94) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal h3{font-size:15px;font-weight:700;margin-bottom:18px;color:var(--text);letter-spacing:-0.2px;}
.modal input {
  width:100%;
  font-size:13px;
  padding:10px 13px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:var(--text);
  outline:none;
  margin-bottom:10px;
  transition:border-color 0.2s, box-shadow 0.2s;
  font-family:inherit;
}
html.light .modal input { background:rgba(0,0,0,0.03); }
.modal input:focus { border-color:var(--purple-border); box-shadow:0 0 0 3px rgba(167,139,250,0.12); }
.modal-label{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;}

/* ── TOAST ── */
.toast {
  position:fixed;
  bottom:24px;
  right:24px;
  background:rgba(11,15,26,0.94);
  border:1px solid var(--green-border);
  border-radius:12px;
  padding:11px 18px;
  font-size:13px;
  color:var(--green);
  opacity:0;
  transition:all 0.3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
  z-index:200;
  transform:translateY(12px) scale(0.96);
  backdrop-filter:blur(12px);
  box-shadow:0 4px 24px rgba(0,229,160,0.14);
  font-weight:500;
}
.toast.show{opacity:1;transform:translateY(0) scale(1);}

/* ── THEME TOGGLE ── */
.theme-toggle{display:flex;align-items:center;gap:8px;margin-left:auto;cursor:pointer;user-select:none;}
.toggle-track {
  width:40px;
  height:22px;
  border-radius:11px;
  background:var(--bg3);
  border:1px solid var(--border2);
  position:relative;
  transition:background 0.3s;
}
.toggle-thumb {
  width:16px;
  height:16px;
  border-radius:50%;
  background:var(--purple);
  position:absolute;
  top:2px;
  left:2px;
  transition:transform 0.3s;
  box-shadow:0 0 8px rgba(167,139,250,0.5);
}
html.light .toggle-thumb{transform:translateX(18px);}

/* ── EXTRA LINK STYLES ── */
.link-extra{color:var(--purple);border-color:var(--purple-border);background:var(--purple-bg);}
.link-extra:hover{background:rgba(167,139,250,0.15);box-shadow:0 0 10px rgba(167,139,250,0.16);}

.links-list{margin-bottom:10px;}
.links-list .link-item{display:flex;gap:6px;align-items:center;margin-bottom:7px;}
.links-list .link-item input{flex:1;margin-bottom:0;}
.links-list .link-rm{background:transparent;border:none;cursor:pointer;color:var(--red);font-size:16px;padding:4px 8px;border-radius:6px;transition:background 0.15s;}
.links-list .link-rm:hover{background:var(--red-bg);}

/* ── NOTES ── */
.note-cell{min-width:120px;}
.note-input {
  font-size:11.5px;
  padding:5px 9px;
  border-radius:7px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:var(--text);
  outline:none;
  width:100%;
  max-width:200px;
  transition:border-color 0.2s, box-shadow 0.2s;
  font-family:inherit;
}

<script>
// ── THEME ──
function toggleTheme(){
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('w3_theme', isLight ? 'light' : 'dark');
  document.getElementById('theme-icon').textContent = isLight ? '☀️' : '🌙';
  document.getElementById('theme-label').textContent = isLight ? 'Light' : 'Dark';
}
if(localStorage.getItem('w3_theme')==='light'){
  document.documentElement.classList.add('light');
  document.getElementById('theme-icon').textContent = '☀️';
  document.getElementById('theme-label').textContent = 'Light';
}

// ── STORAGE ──
const KEYS = ['sol','eth','btc','topinf','inf','dao','base','sei','superteam'];

const AT_TOKEN = 'patKsZTNmb3pAmuat.b8a03f1117d535f72b49e0cc1bdb829d0d2fb0c5a457b7b5314f572bbe0cf22e';
const AT_BASE  = 'appJpWWp9NkIQCugA';
const AT_TABLE = 'Tracker';
const AT_URL   = `https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}`;
const AT_HEADS = { 'Authorization': `Bearer ${AT_TOKEN}`, 'Content-Type': 'application/json' };

// Also keep localStorage as fast cache
function saveLocal(key, data){ try{ localStorage.setItem('w3_'+key, JSON.stringify(data)); }catch(e){} }
function loadLocal(key){ try{ const d=localStorage.getItem('w3_'+key); return d?JSON.parse(d):null; }catch(e){return null;} }
function setSaved(){ document.getElementById('save-txt').textContent = '✓ Synced — '+new Date().toLocaleTimeString(); }
function setSaving(){ document.getElementById('save-txt').textContent = '⏳ Syncing...'; }
function setSaveErr(){ document.getElementById('save-txt').textContent = '⚠️ Sync error — saved locally'; }

// ── FIX #1: Exact category matching ──
// Match category field to key. For DAOs, category is "dao|ProjectName" so use startsWith.
// For everything else, require EXACT match to prevent cross-contamination.
function categoryMatchesKey(category, key) {
  const cat = (category || '').trim();
  if (key === 'dao') return cat.startsWith('dao');
  // Exact match only for non-dao keys
  return cat === key;
}

// Convert our data to Airtable records
function toRecords(key, arr){
  const isDao = key === 'dao';
  return arr.map(d => ({
    fields: {
      Name: d.n || '',
      Handle: isDao ? (d.h||[]).join(';') : (d.x||''),
      Status: d.s || 'pending',
      Contact: d.c || 'pending',
      Links: (d.l||[]).join(';'),
      Notes: d.nt || '',
      CM: (d.cm||[]).join(';'),
      Category: key + (isDao ? ('|'+( d.p||'')) : '')
    }
  }));
}

// Convert Airtable records back to our format
function fromRecords(key, records){
  const isDao = key === 'dao';
  return records.map(r => {
    const f = r.fields;
    const cat = (f.Category||'');
    const contact = f.Contact || 'pending';
    const links = (f.Links||'').split(';').filter(Boolean);
    const cms = (f.CM||'').split(';').filter(Boolean);
    const defaultCm = (CM_DATA[key]||{})[f.Name] || [];
    const finalCm = cms.length ? cms : defaultCm;
    if (isDao) {
      const parts = cat.split('|');
      return { n: f.Name||'', p: parts[1]||'', h: (f.Handle||'').split(';').filter(Boolean), s: f.Status||'pending', c: contact, l: links, nt: f.Notes||'', cm: finalCm, _id: r.id };
    }
    return { n: f.Name||'', x: f.Handle||'', s: f.Status||'pending', c: contact, l: links, nt: f.Notes||'', cm: finalCm, _id: r.id };
  });
}

// ── loadFromAirtable: ONLY reads, NEVER pushes ──
async function loadFromAirtable(){
  setSaving();
  try {
    let all = [], offset = null;
    do {
      const url = AT_URL + '?pageSize=100' + (offset ? '&offset='+offset : '');
      const res = await fetch(url, { headers: AT_HEADS });
      const json = await res.json();
      all = all.concat(json.records||[]);
      offset = json.offset || null;
    } while(offset);

    if(all.length === 0){ setSaved(); return false; }

    // Build temp data first — don't touch DATA yet
    const tempData = {};
    let totalCount = 0;
    KEYS.forEach(k => {
      const recs = all.filter(r => categoryMatchesKey(r.fields.Category, k));
      if(recs.length > 0){
        tempData[k] = fromRecords(k, recs);
        totalCount += tempData[k].length;
      }
    });

    // Only accept if count is reasonable (between 300 and 550)
    if(totalCount < 300 || totalCount > 550){
      console.log('Airtable has ' + totalCount + ' records (expected ~392), keeping local data');
      setSaved();
      return false;
    }

    // Safe to apply
    KEYS.forEach(k => {
      if(tempData[k] && tempData[k].length > 0){
        DATA[k] = tempData[k];
        saveLocal(k, DATA[k]);
      }
    });

    setSaved();
    return true;
  } catch(e){
    console.error('Airtable load error:', e);
    setSaveErr();
    return false;
  }
}

// Save a single item to Airtable
async function saveItemToAirtable(key, item){
  setSaving();
  try {
    const isDao = key === 'dao';
    const fields = {
      Name: item.n||'',
      Handle: isDao ? (item.h||[]).join(';') : (item.x||''),
      Status: item.s||'pending',
      Contact: item.c||'pending',
      Links: (item.l||[]).join(';'),
      Notes: item.nt||'',
      CM: (item.cm||[]).join(';'),
      Category: key + (isDao ? ('|'+(item.p||'')) : '')
    };
    if(item._id){
      const r = await fetch(`${AT_URL}/${item._id}`, { method:'PATCH', headers: AT_HEADS, body: JSON.stringify({fields}) });
      const j = await r.json();
      if(j.error){ setSaveErr(); console.error('PATCH failed:', j.error); return; }
    } else {
      const res = await fetch(AT_URL, { method:'POST', headers: AT_HEADS, body: JSON.stringify({fields}) });
      const json = await res.json();
      if(json.error){ setSaveErr(); console.error('POST failed:', json.error); return; }
      item._id = json.id;
    }
    saveLocal(key, DATA[key]);
    setSaved();
  } catch(e){ setSaveErr(); }
}

// Delete item from Airtable
async function deleteFromAirtable(id){
  try { await fetch(`${AT_URL}/${id}`, { method:'DELETE', headers: AT_HEADS }); } catch(e){}
}

// Add new SEI records to Airtable (one-time use — does not touch existing records)
async function addSEIToAirtable(){
  const items = DATA['sei']||[];
  const newItems = items.filter(d => !d._id);
  if(!newItems.length){ toast('All SEI records already in Airtable!'); return; }
  if(!confirm(`Add ${newItems.length} SEI records to Airtable? (existing records untouched)`)) return;
  setSaving();
  let count = 0, errors = 0;
  for(const item of newItems){
    const fields = {
      Name: item.n||'',
      Handle: item.x||'',
      Status: item.s||'pending',
      Contact: item.c||'pending',
      Links: (item.l||[]).join(';'),
      Notes: item.nt||'',
      CM: (item.cm||[]).join(';'),
      Category: 'sei'
    };
    try {
      const res = await fetch(AT_URL, { method:'POST', headers: AT_HEADS, body: JSON.stringify({fields}) });
      const json = await res.json();
      if(json.error){ errors++; console.error('POST failed for '+item.n+':', json.error); }
      else { item._id = json.id; count++; }
    } catch(e){ errors++; }
    await new Promise(res => setTimeout(res, 150));
  }
  saveLocal('sei', DATA['sei']);
  if(errors) setSaveErr();
  else { setSaved(); document.getElementById('btn-add-sei').style.display='none'; }
  toast(`SEI: ${count} added${errors?' ('+errors+' errors)':''}`);
}

// Push CM handles for all items that have CM data to Airtable (one-time use)
async function pushCMToAirtable(){
  if(!confirm('This will update the CM field in Airtable for all rows that have CM handles. Continue?')) return;
  let count = 0, errors = 0;
  setSaving();
  for(const key of KEYS){
    const items = DATA[key]||[];
    for(const item of items){
      if((item.cm||[]).length && item._id){
        try {
          const r = await fetch(`${AT_URL}/${item._id}`, { method:'PATCH', headers: AT_HEADS, body: JSON.stringify({fields:{CM: item.cm.join(';')}}) });
          const j = await r.json();
          if(j.error){ errors++; console.error('CM push failed for '+item.n+':', j.error); }
          else count++;
        } catch(e){ errors++; }
        await new Promise(res => setTimeout(res, 100));
      }
    }
  }
  if(errors) setSaveErr();
  else setSaved();
  toast(`CM pushed: ${count} rows updated${errors?' ('+errors+' errors)':''}`);
}

function save(key, data){
  saveLocal(key, data);
  setSaved();
}

// ── DATA ──

// ── MODAL ──
let modalCallback = null;
let modalLinks = [];
function openModal(name, handle, links, cb) {
  document.getElementById('modal-title').textContent = 'Edit Links — ' + name;
  document.getElementById('modal-name').value = name;
  document.getElementById('modal-handle').value = handle || '';
  modalLinks = [...(links||[])];
  modalCallback = cb;
  renderModalLinks();
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('modal-handle').focus(), 50);
}
function closeModal() { document.getElementById('modal').classList.remove('open'); modalCallback = null; }
function renderModalLinks(){
  const c = document.getElementById('modal-links'); c.innerHTML = '';
  modalLinks.forEach((lnk,i) => {
    const div = document.createElement('div'); div.className = 'link-item';
    div.innerHTML = `<input type="text" value="${lnk}" placeholder="https://..." onchange="modalLinks[${i}]=this.value"/><button class="link-rm" onclick="modalLinks.splice(${i},1);renderModalLinks()">×</button>`;
    c.appendChild(div);
  });
}
function addModalLink(){ modalLinks.push(''); renderModalLinks(); }
function saveModal() {
  const h = document.getElementById('modal-handle').value.trim().replace('@','');
  const links = modalLinks.map(l=>l.trim()).filter(Boolean);
  if (modalCallback) modalCallback(h, links);
  closeModal();
}
document.getElementById('modal').addEventListener('click', e => { if(e.target === document.getElementById('modal')) closeModal(); });

}

}

      <p class="hint">${isDao ? 'CSV: <code>DAO,Project,Handles</code> — handles separated by semicolons' : 'CSV: <code>Name,Handle</code>'}</p>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="label">Total</div><div class="value" id="st-total-${idx}">0</div></div>
      <div class="stat-card green"><div class="label">Active</div><div class="value" id="st-active-${idx}">0</div></div>
      <div class="stat-card" style=""><div class="label">Inactive</div><div class="value" id="st-inactive-${idx}" style="color:var(--muted)">0</div></div>
      <div class="stat-card amber"><div class="label">Pending</div><div class="value" id="st-pending-${idx}">0</div></div>
      <div class="stat-card blue"><div class="label">Contacted</div><div class="value" id="st-contacted-${idx}">0</div></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="prog-${idx}" style="width:0%;background:${color}"></div></div>
      <div class="progress-label" id="prog-label-${idx}">0% checked</div>
    </div>

    <div class="toolbar">
      <input type="text" id="search-${idx}" placeholder="Search..." oninput="renderPanel(${idx})"/>
      <select id="filter-${idx}" onchange="renderPanel(${idx})">
        <option value="all">All statuses</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
        <option value="pending">Pending</option>
      </select>
      <select id="cfilter-${idx}" onchange="renderPanel(${idx})">
        <option value="all">All contact</option>
        <option value="contacted">Contacted</option>
        <option value="notcontacted">Not contacted</option>
        <option value="pending">Contact pending</option>
      </select>
    </div>

    <div class="legend">
      <div class="leg"><span class="leg-dot" style="background:var(--green)"></span>Active</div>
      <div class="leg"><span class="leg-dot" style="background:var(--muted)"></span>Inactive</div>
      <div class="leg"><span class="leg-dot" style="background:var(--amber)"></span>Pending</div>
      <div class="leg"><span class="leg-dot" style="background:var(--blue)"></span>Contacted</div>
      <div class="leg"><span class="leg-dot" style="background:var(--red)"></span>Not contacted</div>
    </div>

    <div class="bulk-row">
      <button class="btn" onclick="markAll(${idx},'active')">All visible → Active</button>
      <button class="btn" onclick="markAll(${idx},'inactive')">All visible → Inactive</button>
      <button class="btn" onclick="markAll(${idx},'pending')">Reset visible</button>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th style="width:32px">#</th>
            <th>${isDao ? 'DAO' : 'Name'}</th>
            <th>${isDao ? 'Members on X' : 'Links'}</th>
            <th>Status</th>
            <th>Contact</th>
            <th>Notes</th>
            <th style="width:40px"></th>
          </tr></thead>
          <tbody id="tbody-${idx}"></tbody>
        </table>
      </div>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:8px;">Click ✏️ to edit links. Click badges to toggle. Sorted A→Z. Changes save automatically.</p>
  `;
}

// ── RENDER ──
function getFiltered(idx) {
  const key = keyOf(idx);
  const q = (document.getElementById('search-'+idx)||{value:''}).value.toLowerCase();
  const fs = (document.getElementById('filter-'+idx)||{value:'all'}).value;
  const cf = (document.getElementById('cfilter-'+idx)||{value:'all'}).value;
  return DATA[key].map((d,i) => ({...d,i})).filter(d => {
    if (q && !d.n.toLowerCase().includes(q) && !(d.p||'').toLowerCase().includes(q)) return false;
    if (fs !== 'all' && d.s !== fs) return false;
    if (cf !== 'all' && (d.c||'pending') !== cf) return false;
    return true;
  }).sort((a,b) => a.n.localeCompare(b.n, undefined, {sensitivity:'base'}));
}

function renderPanel(idx) {
  const key = keyOf(idx);
  const type = TYPES[idx];
  const isDao = type === 'dao';
  const rows = getFiltered(idx);
  const tbody = document.getElementById('tbody-'+idx);
  if (!tbody) return;
  tbody.innerHTML = '';

  rows.forEach((d, i) => {
    const bc = d.s==='active'?'badge-active':d.s==='inactive'?'badge-inactive':'badge-pending';
    const lbl = d.s==='active'?'● Active':d.s==='inactive'?'● Inactive':'● Pending';
    // Contact badge
    const cc = (d.c||'pending');
    const cbc = cc==='contacted'?'badge-contacted':cc==='notcontacted'?'badge-notcontacted':'badge-contactpending';
    const clbl = cc==='contacted'?'✓ Contacted':cc==='notcontacted'?'✗ Not contacted':'◌ Pending';

    let linkCell = '';
    if (isDao) {
      linkCell = d.h && d.h.length
        ? `<div class="handles">${d.h.map(h=>`<a class="xl" href="https://x.com/${h}" target="_blank"><span class="xl-text">@${h}</span></a>`).join('')}</div>`
        : `<span class="xl-none">No handles</span>`;
    } else {
      let parts = [];
      if(d.x) parts.push(`<a class="xl" href="https://x.com/${d.x}" target="_blank"><span class="xl-text">@${d.x}</span></a>`);
      (d.l||[]).forEach(lnk => {
        const trimmed = lnk.trim().replace(/^@/,'');
        if(!trimmed) return;
        if(!trimmed.startsWith('http')){
          // treat as X handle
          parts.push(`<a class="xl" href="https://x.com/${trimmed}" target="_blank"><span class="xl-text">@${trimmed}</span></a>`);
        } else {
          let label = '';
          try { label = new URL(trimmed).hostname.replace('www.',''); } catch(e){ label = trimmed.slice(0,20); }
          parts.push(`<a class="xl link-extra" href="${trimmed}" target="_blank"><span class="xl-text">${label}</span></a>`);
        }
      });
      const cmList = (d.cm && d.cm.length) ? d.cm : ((CM_DATA[keyOf(idx)]||{})[d.n]||[]);
      cmList.forEach(h => {
        const ch = h.replace(/^@/,'');
        parts.push(`<a class="cm-link" href="https://x.com/${ch}" target="_blank">@${ch}</a>`);
      });
      if(!d.x && !(d.l||[]).length && !cmList.length) parts.push(`<span class="xl-none">No links</span>`);
      parts.push(`<button class="xl-edit" onclick="editLink(${idx},${d.i})" title="Edit links">✏️</button>`);
      parts.push(`<button class="xl-edit" onclick="editCM(${idx},${d.i})" title="Edit CMs" style="font-size:10px;">CM</button>`);
      linkCell = `<div class="cell-link" style="flex-wrap:wrap;">${parts.join('')}</div>`;
    }
    const nameCell = isDao
      ? `<div class="cell-name">${d.n}</div><div class="cell-sub">${d.p||''}</div>`
      : `<div class="cell-name">${d.n}</div>`;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="num">${i+1}</td>
      <td>${nameCell}</td>
      <td>${linkCell}</td>
      <td><span class="badge ${bc}" onclick="cycleStatus(${idx},${d.i})">${lbl}</span></td>
      <td><span class="badge ${cbc}" onclick="cycleContact(${idx},${d.i})">${clbl}</span></td>
      <td class="note-cell"><input class="note-input" value="${(d.nt||'').replace(/"/g,'&quot;')}" placeholder="Add note..." onchange="saveNote(${idx},${d.i},this.value)"/></td>
      <td><button class="del-btn" onclick="delRow(${idx},${d.i})">×</button></td>`;
    tbody.appendChild(tr);
  });

  updateStats(idx);
}

function updateStats(idx) {
  const key = keyOf(idx);
  const arr = DATA[key];
  const a = arr.filter(d=>d.s==='active').length;
  const inactive = arr.filter(d=>d.s==='inactive').length;
  const p = arr.filter(d=>d.s==='pending').length;
  const contacted = arr.filter(d=>d.c==='contacted').length;
  const total = arr.length;
  const checked = a + inactive;
  const pct = total ? Math.round(checked/total*100) : 0;

  const sid = (n, v) => { const el = document.getElementById(`st-${n}-${idx}`); if(el) el.textContent = v; };
  sid('total', total); sid('active', a); sid('inactive', inactive); sid('pending', p); sid('contacted', contacted);

  const prog = document.getElementById('prog-'+idx);
  const plab = document.getElementById('prog-label-'+idx);
  if (prog) prog.style.width = pct + '%';
  if (plab) plab.textContent = `${pct}% checked (${checked}/${total})`;

  const tc = document.getElementById('tc'+idx);
  if (tc) tc.textContent = total;
}

// ── ACTIONS ──
function cycleStatus(idx, i) {
  const key = keyOf(idx);
  const d = DATA[key][i];
  d.s = d.s==='pending'?'active':d.s==='active'?'inactive':'pending';
  saveItemToAirtable(key, d);
  renderPanel(idx);
}

function cycleContact(idx, i) {
  const key = keyOf(idx);
  const d = DATA[key][i];
  const c = d.c||'pending';
  d.c = c==='pending'?'contacted':c==='contacted'?'notcontacted':'pending';
  saveItemToAirtable(key, d);
  renderPanel(idx);
}

function saveNote(idx, i, val) {
  const key = keyOf(idx);
  DATA[key][i].nt = val;
  save(key, DATA[key]);
  saveItemToAirtable(key, DATA[key][i]);
}

function editCM(idx, i) {
  const key = keyOf(idx);
  const d = DATA[key][i];
  const current = (d.cm||[]).join(', ');
  const input = prompt('CM handles for ' + d.n + ' (comma separated, without @):', current);
  if(input === null) return;
  DATA[key][i].cm = input.split(',').map(h => h.trim().replace(/^@/,'')).filter(Boolean);
  save(key, DATA[key]);
  saveItemToAirtable(key, DATA[key][i]);
  renderPanel(idx);
  toast('CM updated!');
}

function delRow(idx, i) {
  const key = keyOf(idx);
  const d = DATA[key][i];
  if(d._id) deleteFromAirtable(d._id);
  DATA[key].splice(i, 1);
  save(key, DATA[key]);
  renderPanel(idx);
}

function editLink(idx, i) {
  const key = keyOf(idx);
  const d = DATA[key][i];
  openModal(d.n, d.x, d.l||[], (newHandle, newLinks) => {
    DATA[key][i].x = newHandle;
    DATA[key][i].l = newLinks;
    saveItemToAirtable(key, DATA[key][i]);
    renderPanel(idx);
    toast('Links updated!');
  });
}

function addRow(idx) {
  const key = keyOf(idx);
  const isDao = TYPES[idx] === 'dao';
  const n = (document.getElementById('add-n-'+idx)||{value:''}).value.trim();
  if (!n) { alert('Enter a name.'); return; }

  if (isDao) {
    const p = (document.getElementById('add-p-'+idx)||{value:''}).value.trim() || '—';
    const hr = (document.getElementById('add-h-'+idx)||{value:''}).value.trim();
    const h = hr ? hr.split(',').map(x=>x.trim().replace('@','')).filter(Boolean) : [];
    DATA[key].push({n, p, h, s:'pending', c:'pending', l:[], nt:'', cm:[]});
    document.getElementById('add-h-'+idx).value = '';
    document.getElementById('add-p-'+idx).value = '';
  } else {
    const x = (document.getElementById('add-x-'+idx)||{value:''}).value.trim().replace('@','');
    if (DATA[key].find(d=>d.n.toLowerCase()===n.toLowerCase())) { alert('Already exists.'); return; }
    DATA[key].push({n, x: x||'', s:'pending', c:'pending', l:[], nt:'', cm:[]});
    if (document.getElementById('add-x-'+idx)) document.getElementById('add-x-'+idx).value = '';
  }
  document.getElementById('add-n-'+idx).value = '';
  save(key, DATA[key]);
  renderPanel(idx);
  toast('Adding to Airtable...');
  saveItemToAirtable(key, DATA[key][DATA[key].length-1]).then(()=>toast('Added: '+n));
}

function markAll(idx, status) {
  const key = keyOf(idx);
  const filtered = getFiltered(idx);
  filtered.forEach(d => DATA[key][d.i].s = status);
  save(key, DATA[key]);
  renderPanel(idx);
  // Batch update to Airtable (up to 10 at a time)
  const chunks = [];
  for(let i=0; i<filtered.length; i+=10) chunks.push(filtered.slice(i,i+10));
  chunks.forEach(chunk => {
    const records = chunk.filter(d=>DATA[key][d.i]._id).map(d=>({id:DATA[key][d.i]._id,fields:{Status:status}}));
    if(records.length) fetch(AT_URL, {method:'PATCH',headers:AT_HEADS,body:JSON.stringify({records})}).then(()=>setSaved()).catch(()=>setSaveErr());
  });
}

function importCSV(idx, input) {
  const key = keyOf(idx);
  const isDao = TYPES[idx] === 'dao';
  const f = input.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    const lines = e.target.result.split('\n').filter(l => l.trim());
    let added = 0;
    lines.forEach((line, i) => {
      if (i===0 && (line.toLowerCase().includes('name') || line.toLowerCase().includes('dao'))) return;
      const parts = line.split(',');
      const n = clean(parts[0]); if (!n) return;
      if (isDao) {
        const p = clean(parts[1]) || '—';
        const h = parts[2] ? clean(parts[2]).split(';').map(x=>x.replace('@','')).filter(Boolean) : [];
        DATA[key].push({n,p,h,s:'pending',c:'pending',l:[],nt:'',cm:[]}); added++;
      } else {
        const x = (clean(parts[1])||'').replace('@','');
        if (DATA[key].find(d=>d.n.toLowerCase()===n.toLowerCase())) return;
        DATA[key].push({n,x,s:'pending',c:'pending',l:[],nt:'',cm:[]}); added++;
      }
    });
    save(key, DATA[key]);
    renderPanel(idx);
    toast(added+' rows imported! Syncing to Airtable...');
    // Save each new row to Airtable
    const newRows = DATA[key].slice(DATA[key].length - added);
    newRows.forEach(row => saveItemToAirtable(key, row));
    input.value = '';
  };
  r.readAsText(f);
}

function exportData(idx, all) {
  const key = keyOf(idx);
  const isDao = TYPES[idx] === 'dao';
  const list = all ? DATA[key] : DATA[key].filter(d=>d.s==='active');
  if (!list.length) { alert('Nothing to export.'); return; }
  let rows;
  if (isDao) {
    rows = ['DAO,Project,Handles,Status,Contact', ...list.map(d=>`"${d.n}","${d.p}","${(d.h||[]).map(h=>'@'+h).join(';')}","${d.s}","${d.c||'pending'}"`)];
  } else {
    rows = ['Name,Handle,URL,Status,Contact,ExtraLinks', ...list.map(d=>`"${d.n}","${d.x?'@'+d.x:''}","${d.x?'https://x.com/'+d.x:''}","${d.s}","${d.c||'pending'}","${(d.l||[]).join(';')}"`)];
  }
  dlCSV(rows, (all?'all_':'active_')+key+'_2026.csv');
}

let isPushing = false;

// Push all local data to Airtable (manual only — via Initial Setup button)
async function pushAllToAirtable(silent){
  if(isPushing){ if(!silent) toast('Already pushing, please wait...'); return; }
  if(!silent && !confirm('This will replace ALL data in Airtable with current local data. Continue?')) return;
  isPushing = true;
  setSaving();
  toast('Deleting old records...');
  try {
    // Phase 1: Delete ALL records — keep looping until truly empty
    let round = 0;
    while(round < 50){
      const res = await fetch(AT_URL + '?pageSize=100&fields[]=Name', {headers: AT_HEADS});
      const json = await res.json();
      const ids = (json.records||[]).map(r=>r.id);
      if(ids.length === 0) break;
      toast('Deleting... round ' + (round+1));
      for(let i=0; i<ids.length; i+=10){
        const batch = ids.slice(i,i+10).map(id=>'records[]='+id).join('&');
        await fetch(AT_URL + '?' + batch, {method:'DELETE', headers: AT_HEADS});
        await new Promise(r=>setTimeout(r,300));
      }
      await new Promise(r=>setTimeout(r,500));
      round++;
    }

    // Phase 2: Verify empty
    const check = await fetch(AT_URL + '?pageSize=1&fields[]=Name', {headers: AT_HEADS});
    const checkJson = await check.json();
    if((checkJson.records||[]).length > 0){
      toast('⚠️ Could not fully clear Airtable. Try again.');
      isPushing = false; setSaveErr(); return;
    }

    // Phase 3: Push all data
    toast('Pushing fresh data...');
    let pushErrors = 0;
    for(const key of KEYS){
      const records = toRecords(key, DATA[key]);
      for(let i=0; i<records.length; i+=10){
        const batch = records.slice(i,i+10);
        const res = await fetch(AT_URL, {method:'POST', headers:AT_HEADS, body:JSON.stringify({records:batch})});
        const json = await res.json();
        if(json.error){
          console.error('Airtable POST error:', json.error);
          // Try without Contact and Links fields (fallback)
          const fallbackBatch = batch.map(r => ({fields: {Name: r.fields.Name, Handle: r.fields.Handle, Status: r.fields.Status, Category: r.fields.Category}}));
          const res2 = await fetch(AT_URL, {method:'POST', headers:AT_HEADS, body:JSON.stringify({records:fallbackBatch})});
          const json2 = await res2.json();
          if(json2.error){ pushErrors++; console.error('Fallback also failed:', json2.error); }
          else { (json2.records||[]).forEach((r,j) => { if(DATA[key][i+j]) DATA[key][i+j]._id = r.id; }); }
        } else {
          (json.records||[]).forEach((r,j) => { if(DATA[key][i+j]) DATA[key][i+j]._id = r.id; });
        }
        await new Promise(r=>setTimeout(r,300));
      }
      saveLocal(key, DATA[key]);
    }
    if(pushErrors > 0){
      toast('⚠️ Some records failed to push. Check console for details.');
      setSaveErr();
    } else {
      setSaved();
      toast('All data pushed to Airtable! (361 records)');
    }
  } catch(e){ setSaveErr(); console.error(e); }
  isPushing = false;
}

// Reset local data to clean defaults (does NOT touch Airtable)
function resetLocal(){
  if(!confirm('Reset local data to defaults? This clears your browser cache. Airtable is not affected.')) return;
  KEYS.forEach(k => localStorage.removeItem('w3_'+k));
  localStorage.removeItem('w3_version');
  localStorage.removeItem('w3_theme');
  KEYS.forEach(k => {
    DATA[k] = JSON.parse(JSON.stringify(DEFAULTS[k])).map(d => ({...d, c:'pending', l:[], nt:'', cm:[]}));
  });
  KEYS.forEach((k, idx) => renderPanel(idx));
  toast('Local data reset to defaults!');
}

// ── INIT ──
KEYS.forEach((k, idx) => buildPanel(idx));
KEYS.forEach((k, idx) => renderPanel(idx));

// Load from Airtable on start — never auto-push
loadFromAirtable().then(loaded => {
  if(loaded) {
    KEYS.forEach((k, idx) => renderPanel(idx));
    toast('Synced with Airtable!');
  } else {
    toast('Using local data. Click "Initial Setup" to push to Airtable.');
  }
});

// Auto-sync every 30 seconds — skip if a save is in progress
let isSaving = false;
const _origSave = saveItemToAirtable;
saveItemToAirtable = async function(key, item){
  isSaving = true;
  try { await _origSave(key, item); }
  finally { setTimeout(() => { isSaving = false; }, 3000); }
};

setInterval(() => {
  if(!isSaving && !isPushing){
    loadFromAirtable().then(loaded => {
      if(loaded) KEYS.forEach((k, idx) => renderPanel(idx));
    });
  }
}, 30000);

// ── STARFIELD ──
(function(){
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  const COUNT = 140;

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function init(){
    resize();
    stars = Array.from({length: COUNT}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      a: Math.random(),
      speed: Math.random() * 0.3 + 0.05,
      drift: (Math.random() - 0.5) * 0.15,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleDir: Math.random() > 0.5 ? 1 : -1
    }));
  }

  function draw(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const isLight = document.documentElement.classList.contains('light');
    if(isLight){ requestAnimationFrame(draw); return; }

    stars.forEach(s => {
      s.a += s.twinkleSpeed * s.twinkleDir;
      if(s.a >= 1 || s.a <= 0.05) s.twinkleDir *= -1;
      s.y -= s.speed;
      s.x += s.drift;
      if(s.y < -2) { s.y = canvas.height + 2; s.x = Math.random() * canvas.width; }
      if(s.x < -2) s.x = canvas.width + 2;
      if(s.x > canvas.width + 2) s.x = -2;

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,210,255,${s.a * 0.55})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); });
  init();
  draw();
})();
</script>
