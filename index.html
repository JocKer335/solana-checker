<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Web3 Activity Checker</title>
<style>
:root {
  --bg: #080b12;
  --bg2: #0d1117;
  --bg3: #111827;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e2e8f0;
  --muted: #64748b;
  --muted2: #94a3b8;
  --green: #10b981;
  --green-bg: rgba(16,185,129,0.1);
  --green-border: rgba(16,185,129,0.3);
  --amber: #f59e0b;
  --amber-bg: rgba(245,158,11,0.1);
  --amber-border: rgba(245,158,11,0.3);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.1);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.1);
  --blue-border: rgba(59,130,246,0.3);
  --purple: #8b5cf6;
  --purple-bg: rgba(139,92,246,0.1);
  --purple-border: rgba(139,92,246,0.3);
  --orange: #f97316;
  --orange-bg: rgba(249,115,22,0.1);
  --orange-border: rgba(249,115,22,0.3);
  --pink: #ec4899;
  --pink-bg: rgba(236,72,153,0.1);
  --pink-border: rgba(236,72,153,0.3);
  --header-gradient: rgba(139,92,246,0.05);
  --hover-row: rgba(255,255,255,0.02);
  --toggle-bg: #1e293b;
}
html.light {
  --bg: #f8fafc; --bg2: #ffffff; --bg3: #f1f5f9;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.12);
  --text: #1e293b; --muted: #64748b; --muted2: #475569;
  --green: #059669; --green-bg: rgba(5,150,105,0.08); --green-border: rgba(5,150,105,0.25);
  --amber: #d97706; --amber-bg: rgba(217,119,6,0.08); --amber-border: rgba(217,119,6,0.25);
  --red: #dc2626; --red-bg: rgba(220,38,38,0.06);
  --blue: #2563eb; --blue-bg: rgba(37,99,235,0.06); --blue-border: rgba(37,99,235,0.2);
  --purple: #7c3aed; --purple-bg: rgba(124,58,237,0.06); --purple-border: rgba(124,58,237,0.2);
  --orange: #ea580c; --orange-bg: rgba(234,88,12,0.06); --orange-border: rgba(234,88,12,0.2);
  --pink: #db2777; --pink-bg: rgba(219,39,119,0.06); --pink-border: rgba(219,39,119,0.2);
  --header-gradient: rgba(124,58,237,0.03); --hover-row: rgba(0,0,0,0.02); --toggle-bg: #e2e8f0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background 0.3s,color 0.3s;}
.header{padding:24px 28px 0;background:linear-gradient(180deg,var(--header-gradient) 0%,transparent 100%);border-bottom:1px solid var(--border);}
.header-top{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.logo{width:36px;height:36px;background:var(--purple-bg);border:1px solid var(--purple-border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.header h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--text),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header p{font-size:12px;color:var(--muted);margin-left:52px;margin-bottom:16px;}
.save-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--green);background:var(--green-bg);border:1px solid var(--green-border);border-radius:20px;padding:4px 12px;margin-left:52px;margin-bottom:16px;}
.save-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.theme-toggle{display:flex;align-items:center;gap:8px;margin-left:auto;cursor:pointer;user-select:none;}
.toggle-track{width:40px;height:22px;border-radius:11px;background:var(--toggle-bg);border:1px solid var(--border2);position:relative;transition:background 0.3s;}
.toggle-thumb{width:16px;height:16px;border-radius:50%;background:var(--purple);position:absolute;top:2px;left:2px;transition:transform 0.3s;}
html.light .toggle-thumb{transform:translateX(18px);}
.tabs{display:flex;gap:2px;overflow-x:auto;}.tabs::-webkit-scrollbar{display:none;}
.tab{display:flex;align-items:center;gap:7px;padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);background:transparent;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all 0.2s;}
.tab:hover{color:var(--text);}.tab.active{color:var(--text);border-bottom-color:var(--purple);}
.tab-dot{width:8px;height:8px;border-radius:50%;}
.tab-count{font-size:10px;background:var(--bg3);padding:2px 7px;border-radius:20px;color:var(--muted);}
.tab.active .tab-count{background:var(--purple-bg);color:var(--purple);}
.main{padding:20px 28px;}.panel{display:none;}.panel.active{display:block;}
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 18px;flex:1;min-width:80px;}
.stat-card .label{font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
.stat-card .value{font-size:22px;font-weight:700;color:var(--text);}
.stat-card.green .value{color:var(--green);}.stat-card.amber .value{color:var(--amber);}.stat-card.red .value{color:var(--red);}.stat-card.blue .value{color:var(--blue);}
.progress-wrap{margin-bottom:20px;}.progress-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;transition:width 0.4s;}.progress-label{font-size:11px;color:var(--muted);margin-top:5px;}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.toolbar input,.toolbar select{font-size:13px;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);outline:none;transition:border-color 0.2s;}
.toolbar input{flex:1;min-width:180px;}.toolbar input:focus,.toolbar select:focus{border-color:var(--purple);}
.btn{font-size:12px;padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted2);transition:all 0.2s;white-space:nowrap;}
.btn:hover{border-color:var(--border2);color:var(--text);background:var(--bg3);}
.btn-purple{color:var(--purple);border-color:var(--purple-border);}.btn-purple:hover{background:var(--purple-bg);}
.btn-green{color:var(--green);border-color:var(--green-border);}.btn-green:hover{background:var(--green-bg);}
.btn-red{color:var(--red);border-color:rgba(239,68,68,0.3);}.btn-red:hover{background:var(--red-bg);}
.add-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:20px;}
.add-box-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;font-weight:500;color:var(--muted2);}
.add-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.add-row input{flex:1;min-width:140px;font-size:13px;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);outline:none;}
.add-row input:focus{border-color:var(--purple);}
.add-row label{font-size:12px;padding:8px 14px;border-radius:10px;border:1px solid var(--blue-border);color:var(--blue);cursor:pointer;transition:all 0.2s;}
.add-row label:hover{background:var(--blue-bg);}.add-row input[type="file"]{display:none;}
.hint{font-size:11px;color:var(--muted);margin-top:8px;}.hint code{background:var(--bg3);padding:1px 6px;border-radius:4px;color:var(--muted2);font-size:10px;}
.bulk-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px;}
.table-scroll{max-height:520px;overflow-y:auto;}.table-scroll::-webkit-scrollbar{width:4px;}.table-scroll::-webkit-scrollbar-track{background:transparent;}.table-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{position:sticky;top:0;z-index:10;}thead th{text-align:left;padding:12px 14px;font-size:11px;font-weight:500;color:var(--muted);background:var(--bg3);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s;}tbody tr:hover{background:var(--hover-row);}tbody tr:last-child{border-bottom:none;}
td{padding:11px 14px;vertical-align:middle;}.cell-name{font-weight:500;color:var(--text);}.cell-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.cell-link{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.xl{color:var(--blue);text-decoration:none;font-size:12px;display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;border:1px solid var(--blue-border);background:var(--blue-bg);white-space:nowrap;}
.xl:hover{background:rgba(59,130,246,0.2);}.xl-text{font-size:10px;}
.xl-edit{background:transparent;border:none;cursor:pointer;color:var(--muted);padding:3px 6px;border-radius:6px;font-size:11px;}.xl-edit:hover{color:var(--text);background:var(--bg3);}
.xl-none{font-size:11px;color:var(--muted);font-style:italic;}
.link-extra{color:var(--purple);border-color:var(--purple-border);background:var(--purple-bg);}.link-extra:hover{background:rgba(139,92,246,0.2);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all 0.15s;}.badge:hover{filter:brightness(1.2);}
.badge-active{background:var(--green-bg);color:var(--green);border-color:var(--green-border);}
.badge-inactive{background:var(--bg3);color:var(--muted);border-color:var(--border);}
.badge-pending{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border);}
.badge-contacted{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border);}
.badge-notcontacted{background:var(--red-bg);color:var(--red);border-color:rgba(239,68,68,0.3);}
.badge-contactpending{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border);}
.del-btn{background:transparent;border:none;cursor:pointer;color:var(--muted);padding:4px 8px;border-radius:6px;font-size:14px;transition:all 0.15s;}.del-btn:hover{color:var(--red);background:var(--red-bg);}
.num{color:var(--muted);font-size:11px;width:30px;}.handles{display:flex;flex-wrap:wrap;gap:4px;}
.legend{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;}.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}.leg-dot{width:7px;height:7px;border-radius:50%;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;}.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px;width:480px;max-width:90vw;}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--text);}
.modal input{width:100%;font-size:13px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);outline:none;margin-bottom:10px;}.modal input:focus{border-color:var(--purple);}
.modal-label{font-size:11px;color:var(--muted);margin-bottom:4px;}.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
.links-list{margin-bottom:10px;}.links-list .link-item{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
.links-list .link-item input{flex:1;margin-bottom:0;}.links-list .link-rm{background:transparent;border:none;cursor:pointer;color:var(--red);font-size:16px;padding:4px 8px;border-radius:6px;}.links-list .link-rm:hover{background:var(--red-bg);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--green-border);border-radius:12px;padding:12px 18px;font-size:13px;color:var(--green);opacity:0;transition:all 0.3s;pointer-events:none;z-index:200;transform:translateY(8px);}.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">🌐</div>
    <div><h1>Web3 Activity Checker</h1></div>
    <div class="theme-toggle" onclick="toggleTheme()">
      <span id="theme-icon">🌙</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
      <span id="theme-label" style="font-size:12px;color:var(--muted)">Dark</span>
    </div>
  </div>
  <p>Track projects, influencers & DAOs across Solana · Ethereum · Bitcoin</p>
  <div class="save-pill"><span class="dot"></span><span id="save-txt">Loading...</span></div>
  <div style="margin-left:52px;margin-bottom:16px;display:flex;gap:8px;">
    <button style="font-size:12px;padding:5px 14px;border-radius:8px;border:1px solid rgba(139,92,246,0.3);background:rgba(139,92,246,0.1);color:#8b5cf6;cursor:pointer;" onclick="loadFromAirtable().then(loaded=>{if(loaded){KEYS.forEach((k,i)=>renderPanel(i));toast('Synced!');}})">↓ Sync now</button>
    <button style="font-size:12px;padding:5px 14px;border-radius:8px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.1);color:#ef4444;cursor:pointer;" onclick="resetAndPush()">🔄 Reset & Clean Push</button>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab active" onclick="switchTab(0,this)"><span class="tab-dot" style="background:#8b5cf6"></span>Solana Projects<span class="tab-count" id="tc0">0</span></button>
    <button class="tab" onclick="switchTab(1,this)"><span class="tab-dot" style="background:#627eea"></span>ETH Collab<span class="tab-count" id="tc1">0</span></button>
    <button class="tab" onclick="switchTab(2,this)"><span class="tab-dot" style="background:#f7931a"></span>Bitcoin<span class="tab-count" id="tc2">0</span></button>
    <button class="tab" onclick="switchTab(3,this)"><span class="tab-dot" style="background:#10b981"></span>Top Influencers<span class="tab-count" id="tc3">0</span></button>
    <button class="tab" onclick="switchTab(4,this)"><span class="tab-dot" style="background:#06b6d4"></span>Influencers<span class="tab-count" id="tc4">0</span></button>
    <button class="tab" onclick="switchTab(5,this)"><span class="tab-dot" style="background:#ec4899"></span>Solana DAOs<span class="tab-count" id="tc5">0</span></button>
    <button class="tab" onclick="switchTab(6,this)"><span class="tab-dot" style="background:#0052ff"></span>Base<span class="tab-count" id="tc6">0</span></button>
  </div>
</div>
<div class="main">
<div id="panel-0" class="panel active"></div><div id="panel-1" class="panel"></div><div id="panel-2" class="panel"></div><div id="panel-3" class="panel"></div><div id="panel-4" class="panel"></div><div id="panel-5" class="panel"></div><div id="panel-6" class="panel"></div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Edit Links</h3>
    <div class="modal-label">Name</div>
    <input id="modal-name" type="text" readonly style="color:var(--muted);cursor:default"/>
    <div class="modal-label">Official X Handle (without @)</div>
    <input id="modal-handle" type="text" placeholder="e.g. MadLadsNFT"/>
    <div class="modal-label" style="margin-top:6px;">Extra Links (full URLs)</div>
    <div class="links-list" id="modal-links"></div>
    <button class="btn" onclick="addModalLink()" style="margin-bottom:12px;font-size:11px;">+ Add link</button>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-purple" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
function toggleTheme(){
  const isLight=document.documentElement.classList.toggle('light');
  localStorage.setItem('w3_theme',isLight?'light':'dark');
  document.getElementById('theme-icon').textContent=isLight?'☀️':'🌙';
  document.getElementById('theme-label').textContent=isLight?'Light':'Dark';
}
if(localStorage.getItem('w3_theme')==='light'){document.documentElement.classList.add('light');document.getElementById('theme-icon').textContent='☀️';document.getElementById('theme-label').textContent='Light';}

const KEYS=['sol','eth','btc','topinf','inf','dao','base'];
const AT_TOKEN='patKsZTNmb3pAmuat.b8a03f1117d535f72b49e0cc1bdb829d0d2fb0c5a457b7b5314f572bbe0cf22e';
const AT_BASE='appJpWWp9NkIQCugA';const AT_TABLE='Projects';
const AT_URL=`https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}`;
const AT_HEADS={'Authorization':`Bearer ${AT_TOKEN}`,'Content-Type':'application/json'};

function saveLocal(k,d){try{localStorage.setItem('w3_'+k,JSON.stringify(d))}catch(e){}}
function loadLocal(k){try{const d=localStorage.getItem('w3_'+k);return d?JSON.parse(d):null}catch(e){return null}}
function setSaved(){document.getElementById('save-txt').textContent='✓ Synced — '+new Date().toLocaleTimeString()}
function setSaving(){document.getElementById('save-txt').textContent='⏳ Syncing...'}
function setSaveErr(){document.getElementById('save-txt').textContent='⚠️ Sync error — saved locally'}

function categoryMatchesKey(cat,key){const c=(cat||'').trim();if(key==='dao')return c.startsWith('dao');return c===key;}

function toRecords(key,arr){
  const isDao=key==='dao';
  return arr.map(d=>({fields:{Name:d.n||'',Handle:isDao?(d.h||[]).join(';'):(d.x||''),Status:d.s||'pending',Contact:d.c||'pending',Links:(d.l||[]).join(';'),Category:key+(isDao?('|'+(d.p||'')):'')} }));
}
function fromRecords(key,records){
  const isDao=key==='dao';
  return records.map(r=>{const f=r.fields;const cat=(f.Category||'');const links=(f.Links||'').split(';').filter(Boolean);const contact=f.Contact||'pending';
    if(isDao){const parts=cat.split('|');return{n:f.Name||'',p:parts[1]||'',h:(f.Handle||'').split(';').filter(Boolean),s:f.Status||'pending',c:contact,l:links,_id:r.id};}
    return{n:f.Name||'',x:f.Handle||'',s:f.Status||'pending',c:contact,l:links,_id:r.id};
  });
}

async function loadFromAirtable(){
  setSaving();
  try{
    let all=[],offset=null;
    do{const url=AT_URL+'?pageSize=100'+(offset?'&offset='+offset:'');const res=await fetch(url,{headers:AT_HEADS});const json=await res.json();all=all.concat(json.records||[]);offset=json.offset||null;}while(offset);
    if(all.length===0){console.log('Airtable empty, using local data');setSaved();return false;}
    const tempData={};let totalCount=0;
    KEYS.forEach(k=>{const recs=all.filter(r=>categoryMatchesKey(r.fields.Category,k));if(recs.length>0){tempData[k]=fromRecords(k,recs);totalCount+=tempData[k].length;}});
    // Only accept data if count is reasonable (between 300-500)
    if(totalCount<300||totalCount>500){console.log('Airtable has '+totalCount+' records (expected ~361), keeping local data');setSaved();return false;}
    KEYS.forEach(k=>{if(tempData[k]&&tempData[k].length>0){DATA[k]=tempData[k];saveLocal(k,DATA[k]);}});
    setSaved();return true;
  }catch(e){console.error('Airtable load error:',e);setSaveErr();return false;}
}

async function saveItemToAirtable(key,item){
  setSaving();
  try{const isDao=key==='dao';
    const fields={Name:item.n||'',Handle:isDao?(item.h||[]).join(';'):(item.x||''),Status:item.s||'pending',Contact:item.c||'pending',Links:(item.l||[]).join(';'),Category:key+(isDao?('|'+(item.p||'')):'')};
    if(item._id){await fetch(`${AT_URL}/${item._id}`,{method:'PATCH',headers:AT_HEADS,body:JSON.stringify({fields})});}
    else{const res=await fetch(AT_URL,{method:'POST',headers:AT_HEADS,body:JSON.stringify({fields})});const json=await res.json();item._id=json.id;}
    saveLocal(key,DATA[key]);setSaved();
  }catch(e){setSaveErr();}
}
async function deleteFromAirtable(id){try{await fetch(`${AT_URL}/${id}`,{method:'DELETE',headers:AT_HEADS});}catch(e){}}

let modalCallback=null,modalLinks=[];
function openModal(name,handle,links,cb){
  document.getElementById('modal-title').textContent='Edit Links — '+name;
  document.getElementById('modal-name').value=name;
  document.getElementById('modal-handle').value=handle||'';
  modalLinks=[...(links||[])];modalCallback=cb;renderModalLinks();
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-handle').focus(),50);
}
function closeModal(){document.getElementById('modal').classList.remove('open');modalCallback=null;}
function renderModalLinks(){
  const c=document.getElementById('modal-links');c.innerHTML='';
  modalLinks.forEach((lnk,i)=>{const div=document.createElement('div');div.className='link-item';
    div.innerHTML=`<input type="text" value="${lnk}" placeholder="https://..." onchange="modalLinks[${i}]=this.value"/><button class="link-rm" onclick="modalLinks.splice(${i},1);renderModalLinks()">×</button>`;c.appendChild(div);});
}
function addModalLink(){modalLinks.push('');renderModalLinks();}
function saveModal(){const h=document.getElementById('modal-handle').value.trim().replace('@','');const links=modalLinks.map(l=>l.trim()).filter(Boolean);if(modalCallback)modalCallback(h,links);closeModal();}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

let activeTab=0;
function switchTab(idx,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));el.classList.add('active');document.getElementById('panel-'+idx).classList.add('active');activeTab=idx;}

function clean(s){return(s||'').replace(/^"|"$/g,'').trim();}
function dlCSV(rows,fn){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));a.download=fn;a.click();}
function keyOf(idx){return KEYS[idx];}

const COLORS=['#8b5cf6','#627eea','#f7931a','#10b981','#06b6d4','#ec4899','#0052ff'];
const NAMES=['Solana Projects','ETH Collab','Bitcoin','Top Influencers','Influencers','Solana DAOs','Base'];
const TYPES=['project','project','project','influencer','influencer','dao','project'];

function buildPanel(idx){
  const panel=document.getElementById('panel-'+idx);const color=COLORS[idx];const type=TYPES[idx];const isDao=type==='dao';
  panel.innerHTML=`
    <div class="add-box"><div class="add-box-header" style="color:${color}">+ Add / Import</div>
      <div class="add-row"><input type="text" id="add-n-${idx}" placeholder="${isDao?'DAO name...':'Name...'}"/>
        ${isDao?`<input type="text" id="add-p-${idx}" placeholder="Project..."/><input type="text" id="add-h-${idx}" placeholder="@handles, comma separated..."/>`:`<input type="text" id="add-x-${idx}" placeholder="@x handle (optional)"/>`}
        <button class="btn btn-green" onclick="addRow(${idx})">+ Add</button>
        <label>Upload CSV <input type="file" id="csv-${idx}" accept=".csv" onchange="importCSV(${idx},this)"/></label>
        <button class="btn btn-purple" onclick="exportData(${idx},false)">Export active ↓</button>
        <button class="btn" onclick="exportData(${idx},true)">Export all ↓</button></div>
      <p class="hint">${isDao?'CSV: <code>DAO,Project,Handles</code> — handles separated by semicolons':'CSV: <code>Name,Handle</code>'}</p></div>
    <div class="stats-row">
      <div class="stat-card"><div class="label">Total</div><div class="value" id="st-total-${idx}">0</div></div>
      <div class="stat-card green"><div class="label">Active</div><div class="value" id="st-active-${idx}">0</div></div>
      <div class="stat-card"><div class="label">Inactive</div><div class="value" id="st-inactive-${idx}" style="color:var(--muted)">0</div></div>
      <div class="stat-card amber"><div class="label">Pending</div><div class="value" id="st-pending-${idx}">0</div></div>
      <div class="stat-card blue"><div class="label">Contacted</div><div class="value" id="st-contacted-${idx}">0</div></div></div>
    <div class="progress-wrap"><div class="progress-track"><div class="progress-fill" id="prog-${idx}" style="width:0%;background:${color}"></div></div><div class="progress-label" id="prog-label-${idx}">0% checked</div></div>
    <div class="toolbar"><input type="text" id="search-${idx}" placeholder="Search..." oninput="renderPanel(${idx})"/>
      <select id="filter-${idx}" onchange="renderPanel(${idx})"><option value="all">All statuses</option><option value="active">Active</option><option value="inactive">Inactive</option><option value="pending">Pending</option></select>
      <select id="cfilter-${idx}" onchange="renderPanel(${idx})"><option value="all">All contact</option><option value="contacted">Contacted</option><option value="notcontacted">Not contacted</option><option value="pending">Contact pending</option></select></div>
    <div class="legend">
      <div class="leg"><span class="leg-dot" style="background:var(--green)"></span>Active</div>
      <div class="leg"><span class="leg-dot" style="background:var(--muted)"></span>Inactive</div>
      <div class="leg"><span class="leg-dot" style="background:var(--amber)"></span>Pending</div>
      <div class="leg"><span class="leg-dot" style="background:var(--blue)"></span>Contacted</div>
      <div class="leg"><span class="leg-dot" style="background:var(--red)"></span>Not contacted</div></div>
    <div class="bulk-row"><button class="btn" onclick="markAll(${idx},'active')">All visible → Active</button><button class="btn" onclick="markAll(${idx},'inactive')">All visible → Inactive</button><button class="btn" onclick="markAll(${idx},'pending')">Reset visible</button></div>
    <div class="table-wrap"><div class="table-scroll"><table><thead><tr><th style="width:32px">#</th><th>${isDao?'DAO':'Name'}</th><th>${isDao?'Members on X':'Links'}</th><th>Status</th><th>Contact</th><th style="width:40px"></th></tr></thead><tbody id="tbody-${idx}"></tbody></table></div></div>
    <p style="font-size:11px;color:var(--muted);margin-top:8px;">Click ✏️ to edit links. Click badges to toggle. Sorted A→Z. Changes save automatically.</p>`;
}

function getFiltered(idx){
  const key=keyOf(idx);const q=(document.getElementById('search-'+idx)||{value:''}).value.toLowerCase();
  const fs=(document.getElementById('filter-'+idx)||{value:'all'}).value;
  const cf=(document.getElementById('cfilter-'+idx)||{value:'all'}).value;
  return DATA[key].map((d,i)=>({...d,i})).filter(d=>{
    if(q&&!d.n.toLowerCase().includes(q)&&!(d.p||'').toLowerCase().includes(q))return false;
    if(fs!=='all'&&d.s!==fs)return false;
    if(cf!=='all'&&(d.c||'pending')!==cf)return false;return true;
  }).sort((a,b)=>a.n.localeCompare(b.n,undefined,{sensitivity:'base'}));
}

function renderPanel(idx){
  const key=keyOf(idx);const type=TYPES[idx];const isDao=type==='dao';const rows=getFiltered(idx);
  const tbody=document.getElementById('tbody-'+idx);if(!tbody)return;tbody.innerHTML='';
  rows.forEach((d,i)=>{
    const bc=d.s==='active'?'badge-active':d.s==='inactive'?'badge-inactive':'badge-pending';
    const lbl=d.s==='active'?'● Active':d.s==='inactive'?'● Inactive':'● Pending';
    const cc=(d.c||'pending');const cbc=cc==='contacted'?'badge-contacted':cc==='notcontacted'?'badge-notcontacted':'badge-contactpending';
    const clbl=cc==='contacted'?'✓ Contacted':cc==='notcontacted'?'✗ Not contacted':'◌ Pending';
    let linkCell='';
    if(isDao){linkCell=d.h&&d.h.length?`<div class="handles">${d.h.map(h=>`<a class="xl" href="https://x.com/${h}" target="_blank"><span class="xl-text">@${h}</span></a>`).join('')}</div>`:`<span class="xl-none">No handles</span>`;}
    else{let parts=[];
      if(d.x)parts.push(`<a class="xl" href="https://x.com/${d.x}" target="_blank"><span class="xl-text">@${d.x}</span></a>`);
      (d.l||[]).forEach(lnk=>{let label='';try{label=new URL(lnk).hostname.replace('www.','');}catch(e){label=lnk.slice(0,20);}parts.push(`<a class="xl link-extra" href="${lnk}" target="_blank"><span class="xl-text">${label}</span></a>`);});
      if(!d.x&&!(d.l||[]).length)parts.push(`<span class="xl-none">No links</span>`);
      parts.push(`<button class="xl-edit" onclick="editLink(${idx},${d.i})" title="Edit links">✏️</button>`);
      linkCell=`<div class="cell-link">${parts.join('')}</div>`;}
    const nameCell=isDao?`<div class="cell-name">${d.n}</div><div class="cell-sub">${d.p||''}</div>`:`<div class="cell-name">${d.n}</div>`;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td class="num">${i+1}</td><td>${nameCell}</td><td>${linkCell}</td><td><span class="badge ${bc}" onclick="cycleStatus(${idx},${d.i})">${lbl}</span></td><td><span class="badge ${cbc}" onclick="cycleContact(${idx},${d.i})">${clbl}</span></td><td><button class="del-btn" onclick="delRow(${idx},${d.i})">×</button></td>`;
    tbody.appendChild(tr);});
  updateStats(idx);
}

function updateStats(idx){
  const key=keyOf(idx);const arr=DATA[key];
  const a=arr.filter(d=>d.s==='active').length;const inactive=arr.filter(d=>d.s==='inactive').length;
  const p=arr.filter(d=>d.s==='pending').length;const contacted=arr.filter(d=>d.c==='contacted').length;
  const total=arr.length;const checked=a+inactive;const pct=total?Math.round(checked/total*100):0;
  const sid=(n,v)=>{const el=document.getElementById(`st-${n}-${idx}`);if(el)el.textContent=v;};
  sid('total',total);sid('active',a);sid('inactive',inactive);sid('pending',p);sid('contacted',contacted);
  const prog=document.getElementById('prog-'+idx);const plab=document.getElementById('prog-label-'+idx);
  if(prog)prog.style.width=pct+'%';if(plab)plab.textContent=`${pct}% checked (${checked}/${total})`;
  const tc=document.getElementById('tc'+idx);if(tc)tc.textContent=total;
}

function cycleStatus(idx,i){const key=keyOf(idx);const d=DATA[key][i];d.s=d.s==='pending'?'active':d.s==='active'?'inactive':'pending';saveItemToAirtable(key,d);renderPanel(idx);}
function cycleContact(idx,i){const key=keyOf(idx);const d=DATA[key][i];const c=d.c||'pending';d.c=c==='pending'?'contacted':c==='contacted'?'notcontacted':'pending';saveItemToAirtable(key,d);renderPanel(idx);}
function delRow(idx,i){const key=keyOf(idx);const d=DATA[key][i];if(d._id)deleteFromAirtable(d._id);DATA[key].splice(i,1);save(key,DATA[key]);renderPanel(idx);}
function editLink(idx,i){const key=keyOf(idx);const d=DATA[key][i];openModal(d.n,d.x,d.l||[],(newHandle,newLinks)=>{DATA[key][i].x=newHandle;DATA[key][i].l=newLinks;saveItemToAirtable(key,DATA[key][i]);renderPanel(idx);toast('Links updated!');});}

function addRow(idx){
  const key=keyOf(idx);const isDao=TYPES[idx]==='dao';
  const n=(document.getElementById('add-n-'+idx)||{value:''}).value.trim();if(!n){alert('Enter a name.');return;}
  if(isDao){const p=(document.getElementById('add-p-'+idx)||{value:''}).value.trim()||'—';const hr=(document.getElementById('add-h-'+idx)||{value:''}).value.trim();
    const h=hr?hr.split(',').map(x=>x.trim().replace('@','')).filter(Boolean):[];DATA[key].push({n,p,h,s:'pending',c:'pending',l:[]});
    document.getElementById('add-h-'+idx).value='';document.getElementById('add-p-'+idx).value='';
  }else{const x=(document.getElementById('add-x-'+idx)||{value:''}).value.trim().replace('@','');
    if(DATA[key].find(d=>d.n.toLowerCase()===n.toLowerCase())){alert('Already exists.');return;}
    DATA[key].push({n,x:x||'',s:'pending',c:'pending',l:[]});if(document.getElementById('add-x-'+idx))document.getElementById('add-x-'+idx).value='';}
  document.getElementById('add-n-'+idx).value='';save(key,DATA[key]);renderPanel(idx);
  toast('Adding to Airtable...');saveItemToAirtable(key,DATA[key][DATA[key].length-1]).then(()=>toast('Added: '+n));
}

function markAll(idx,status){
  const key=keyOf(idx);const filtered=getFiltered(idx);filtered.forEach(d=>DATA[key][d.i].s=status);save(key,DATA[key]);renderPanel(idx);
  const chunks=[];for(let i=0;i<filtered.length;i+=10)chunks.push(filtered.slice(i,i+10));
  chunks.forEach(chunk=>{const records=chunk.filter(d=>DATA[key][d.i]._id).map(d=>({id:DATA[key][d.i]._id,fields:{Status:status}}));
    if(records.length)fetch(AT_URL,{method:'PATCH',headers:AT_HEADS,body:JSON.stringify({records})}).then(()=>setSaved()).catch(()=>setSaveErr());});
}

function importCSV(idx,input){
  const key=keyOf(idx);const isDao=TYPES[idx]==='dao';const f=input.files[0];if(!f)return;const r=new FileReader();
  r.onload=e=>{const lines=e.target.result.split('\n').filter(l=>l.trim());let added=0;
    lines.forEach((line,i)=>{if(i===0&&(line.toLowerCase().includes('name')||line.toLowerCase().includes('dao')))return;
      const parts=line.split(',');const n=clean(parts[0]);if(!n)return;
      if(isDao){const p=clean(parts[1])||'—';const h=parts[2]?clean(parts[2]).split(';').map(x=>x.replace('@','')).filter(Boolean):[];DATA[key].push({n,p,h,s:'pending',c:'pending',l:[]});added++;}
      else{const x=(clean(parts[1])||'').replace('@','');if(DATA[key].find(d=>d.n.toLowerCase()===n.toLowerCase()))return;DATA[key].push({n,x,s:'pending',c:'pending',l:[]});added++;}});
    save(key,DATA[key]);renderPanel(idx);toast(added+' rows imported! Syncing...');
    const newRows=DATA[key].slice(DATA[key].length-added);newRows.forEach(row=>saveItemToAirtable(key,row));input.value='';};r.readAsText(f);
}

function exportData(idx,all){
  const key=keyOf(idx);const isDao=TYPES[idx]==='dao';const list=all?DATA[key]:DATA[key].filter(d=>d.s==='active');if(!list.length){alert('Nothing to export.');return;}
  let rows;if(isDao){rows=['DAO,Project,Handles,Status,Contact',...list.map(d=>`"${d.n}","${d.p}","${(d.h||[]).map(h=>'@'+h).join(';')}","${d.s}","${d.c||'pending'}"`)];}
  else{rows=['Name,Handle,URL,Status,Contact,ExtraLinks',...list.map(d=>`"${d.n}","${d.x?'@'+d.x:''}","${d.x?'https://x.com/'+d.x:''}","${d.s}","${d.c||'pending'}","${(d.l||[]).join(';')}"`)];};
  dlCSV(rows,(all?'all_':'active_')+key+'_2026.csv');
}

let isPushing=false;
async function pushAllToAirtable(silent){
  if(isPushing){if(!silent)toast('Already pushing...');return;}
  if(!silent&&!confirm('This will replace ALL data in Airtable. Continue?'))return;
  isPushing=true;setSaving();
  toast('Deleting old records...');
  try{
    // Phase 1: Delete ALL records — keep going until truly 0
    let deleteRounds=0;
    while(deleteRounds<100){
      const checkRes=await fetch(AT_URL+'?pageSize=100&fields[]=Name',{headers:AT_HEADS});
      const checkJson=await checkRes.json();
      const ids=(checkJson.records||[]).map(r=>r.id);
      if(ids.length===0)break;
      toast('Deleting... '+ids.length+' remaining (round '+(deleteRounds+1)+')');
      for(let i=0;i<ids.length;i+=10){
        const batch=ids.slice(i,i+10).map(id=>'records[]='+id).join('&');
        await fetch(AT_URL+'?'+batch,{method:'DELETE',headers:AT_HEADS});
        await new Promise(r=>setTimeout(r,300));
      }
      await new Promise(r=>setTimeout(r,500)); // extra pause between rounds
      deleteRounds++;
    }
    // Phase 2: VERIFY it's truly empty before pushing
    const verifyRes=await fetch(AT_URL+'?pageSize=1&fields[]=Name',{headers:AT_HEADS});
    const verifyJson=await verifyRes.json();
    if((verifyJson.records||[]).length>0){
      toast('⚠️ Could not fully clear Airtable. Try deleting manually first.');
      isPushing=false;setSaveErr();return;
    }
    // Phase 3: Push clean data
    toast('Airtable empty! Pushing fresh data...');
    for(const key of KEYS){
      const records=toRecords(key,DATA[key]);
      for(let i=0;i<records.length;i+=10){
        const batch=records.slice(i,i+10);
        const res=await fetch(AT_URL,{method:'POST',headers:AT_HEADS,body:JSON.stringify({records:batch})});
        const json=await res.json();
        (json.records||[]).forEach((r,j)=>{if(DATA[key][i+j])DATA[key][i+j]._id=r.id;});
        await new Promise(r=>setTimeout(r,300));
      }
      saveLocal(key,DATA[key]);
    }
    setSaved();toast('All data pushed to Airtable! (361 records)');
  }catch(e){setSaveErr();console.error(e);}isPushing=false;
}

// Reset all local data to defaults and clean-push to Airtable
async function resetAndPush(){
  if(!confirm('This will RESET all data to defaults and re-push to Airtable. All status/contact changes will be lost. Continue?'))return;
  // Clear all localStorage
  KEYS.forEach(k=>localStorage.removeItem('w3_'+k));
  localStorage.removeItem('w3_version');
  // Reload defaults
  KEYS.forEach(k=>{DATA[k]=JSON.parse(JSON.stringify(DEFAULTS[k])).map(d=>({...d,c:'pending',l:[]}));});
  KEYS.forEach((k,idx)=>renderPanel(idx));
  toast('Pushing clean data...');
  await pushAllToAirtable(true);
  KEYS.forEach((k,idx)=>renderPanel(idx));
  toast('Done! All clean.');
}

// Track if a save is in progress — skip auto-sync while saving
let isSaving=false;
const origSaveItem=saveItemToAirtable;
saveItemToAirtable=async function(key,item){isSaving=true;try{await origSaveItem(key,item);}finally{setTimeout(()=>{isSaving=false;},2000);}};

KEYS.forEach((k,idx)=>buildPanel(idx));KEYS.forEach((k,idx)=>renderPanel(idx));

// Simple init: try to load from Airtable, otherwise use local/defaults
loadFromAirtable().then(loaded=>{
  if(loaded){KEYS.forEach((k,idx)=>renderPanel(idx));toast('Synced with Airtable!');}
  else{toast('Using local data');}
});
setInterval(()=>{if(!isSaving){loadFromAirtable().then(loaded=>{if(loaded)KEYS.forEach((k,idx)=>renderPanel(idx));});}},30000);
</script>
