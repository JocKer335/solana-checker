<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solana Project Checker</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0d1117, #161b22);
  color: #e6edf3;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.header {
  text-align: center;
  margin-bottom: 30px;
}

.header h1 {
  margin: 0;
  font-size: 32px;
}

.header p {
  opacity: 0.7;
}

.card {
  background: #161b22;
  border-radius: 16px;
  padding: 20px;
  margin-top: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
  animation: fadeIn 0.5s ease;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #0d1117;
  color: white;
  font-size: 16px;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #00ffa3, #3b82f6);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  opacity: 0.85;
  transform: scale(1.02);
}

.result-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.result-row:last-child {
  border-bottom: none;
}

.status-safe {
  color: #00ffa3;
  font-weight: bold;
}

.status-risky {
  color: #ff4d4d;
  font-weight: bold;
}

.loader {
  text-align: center;
  padding: 20px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Solana Project Checker</h1>
    <p>Analyze tokens instantly</p>
  </div>

  <div class="card">
    <input id="tokenInput" placeholder="Paste Solana token address...">
    <button onclick="checkProject()">Check Project</button>
  </div>

  <div id="loading" class="card loader" style="display:none;">
    Checking project...
  </div>

  <div id="results" class="card" style="display:none;">
    <div class="result-row"><span>Status</span><span id="status"></span></div>
    <div class="result-row"><span>Liquidity</span><span id="liquidity"></span></div>
    <div class="result-row"><span>Creator</span><span id="creator"></span></div>
    <div class="result-row"><span>Ownership</span><span id="ownership"></span></div>
  </div>

</div>

<script>
function checkProject() {
  const input = document.getElementById('tokenInput').value.trim();

  if (!input) {
    alert('Please enter a token address');
    return;
  }

  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('results').style.display = 'block';

    const safe = Math.random() > 0.5;

    document.getElementById('status').innerHTML = safe
      ? '<span class="status-safe">Safe</span>'
      : '<span class="status-risky">Risky</span>';

    document.getElementById('liquidity').innerText = '$' + (Math.random() * 1000000).toFixed(0);
    document.getElementById('creator').innerText = input.slice(0, 6) + '...' + input.slice(-4);
    document.getElementById('ownership').innerText = safe ? 'Renounced' : 'Active';

  }, 1500);
}
</script>

</body>
</html>
