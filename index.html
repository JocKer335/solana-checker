<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Web3 Activity Checker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --bg: #020408;
  --bg2: rgba(4,8,18,0.94);
  --bg3: rgba(6,12,26,0.82);
  --border: rgba(0,229,255,0.07);
  --border2: rgba(0,229,255,0.18);
  --text: #c8d8f0;
  --muted: #203050;
  --muted2: #4a6890;
  --cyan: #00e5ff;
  --green: #00ff88;
  --green-bg: rgba(0,255,136,0.07);
  --green-border: rgba(0,255,136,0.25);
  --amber: #ffb800;
  --amber-bg: rgba(255,184,0,0.07);
  --amber-border: rgba(255,184,0,0.25);
  --red: #ff3060;
  --red-bg: rgba(255,48,96,0.07);
  --blue: #00e5ff;
  --blue-bg: rgba(0,229,255,0.07);
  --blue-border: rgba(0,229,255,0.25);
  --purple: #a855f7;
  --purple-bg: rgba(168,85,247,0.07);
  --purple-border: rgba(168,85,247,0.25);
  --magenta: #ff0080;
  --orange: #ff6820;
  --orange-bg: rgba(255,104,32,0.07);
  --orange-border: rgba(255,104,32,0.25);
  --pink: #ff0080;
  --pink-bg: rgba(255,0,128,0.07);
  --pink-border: rgba(255,0,128,0.25);
  --glow1: #00e5ff;
  --glow2: #a855f7;
  --glow3: #00ff88;
  --grid: rgba(0,229,255,0.035);
}

/* ── LIGHT THEME ── */
html.light {
  --bg: #f0f4ff;
  --bg2: rgba(255,255,255,0.95);
  --bg3: rgba(240,244,255,0.92);
  --border: rgba(80,100,200,0.1);
  --border2: rgba(80,100,200,0.2);
  --text: #0a1020;
  --muted: #b0c0e0;
  --muted2: #5070a0;
  --cyan: #0070cc;
  --green: #059669;
  --green-bg: rgba(5,150,105,0.08);
  --green-border: rgba(5,150,105,0.22);
  --amber: #d97706;
  --amber-bg: rgba(217,119,6,0.08);
  --amber-border: rgba(217,119,6,0.22);
  --red: #dc2626;
  --red-bg: rgba(220,38,38,0.07);
  --blue: #2563eb;
  --blue-bg: rgba(37,99,235,0.07);
  --blue-border: rgba(37,99,235,0.2);
  --purple: #7c3aed;
  --purple-bg: rgba(124,58,237,0.07);
  --purple-border: rgba(124,58,237,0.2);
  --magenta: #db2777;
  --pink: #db2777;
  --pink-bg: rgba(219,39,119,0.07);
  --pink-border: rgba(219,39,119,0.2);
  --grid: rgba(80,100,200,0.04);
}

*{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family:'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition:background 0.4s,color 0.4s;
  position:relative;
  overflow-x:hidden;
}

/* Aurora mesh gradient */
@keyframes auroraDrift{0%{transform:rotate(0deg) scale(1);}50%{transform:rotate(3deg) scale(1.05);}100%{transform:rotate(0deg) scale(1);}}
body::before {
  content:'';position:fixed;inset:-40px;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 10% 5%, rgba(99,225,255,0.15) 0%, transparent 65%),
    radial-gradient(ellipse 60% 50% at 90% 80%, rgba(191,138,255,0.12) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(0,255,183,0.06) 0%, transparent 55%),
    radial-gradient(ellipse 40% 30% at 80% 20%, rgba(255,110,204,0.08) 0%, transparent 55%);
  animation:auroraDrift 12s ease-in-out infinite;
}
html.light body::before {
  background:
    radial-gradient(ellipse 60% 50% at 15% 10%, rgba(99,150,255,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 85% 85%, rgba(0,180,160,0.06) 0%, transparent 70%);
  animation:auroraDrift 12s ease-in-out infinite;
}
body > * { position:relative; z-index:1; }

/* ── HEADER ── */
.header {
  padding:20px 32px 0;
  background:rgba(3,7,17,0.8);
  backdrop-filter:blur(30px) saturate(1.4);
  -webkit-backdrop-filter:blur(30px) saturate(1.4);
  border-bottom:1px solid var(--border2);
  position:sticky;top:0;z-index:50;
  box-shadow:0 4px 40px rgba(0,0,0,0.4), 0 1px 0 rgba(99,225,255,0.06);
}
html.light .header { background:rgba(242,244,250,0.88); box-shadow:0 4px 30px rgba(0,0,0,0.06); }

.header-top { display:flex; align-items:center; gap:16px; margin-bottom:14px; }

@keyframes logoSpin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
@keyframes logoPulse{0%,100%{box-shadow:0 0 20px rgba(99,225,255,0.3),0 0 60px rgba(99,225,255,0.1),inset 0 1px 0 rgba(255,255,255,0.15);}50%{box-shadow:0 0 30px rgba(191,138,255,0.4),0 0 80px rgba(191,138,255,0.15),inset 0 1px 0 rgba(255,255,255,0.15);}}
.logo {
  width:42px;height:42px;
  background:linear-gradient(135deg, rgba(99,225,255,0.2), rgba(191,138,255,0.2), rgba(0,255,183,0.15));
  border:1px solid rgba(99,225,255,0.25);
  border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
  animation:logoPulse 4s ease-in-out infinite;
  position:relative;overflow:hidden;
}
.logo::before{content:'';position:absolute;inset:-2px;background:conic-gradient(from 0deg,transparent,rgba(99,225,255,0.3),transparent,rgba(191,138,255,0.3),transparent);border-radius:inherit;animation:logoSpin 6s linear infinite;opacity:0.5;z-index:-1;}

@keyframes titleShift{0%{background-position:0% center;}100%{background-position:200% center;}}
.header h1 {
  font-size:22px;font-weight:800;letter-spacing:-0.5px;
  background:linear-gradient(90deg,#63e1ff,#bf8aff,#00ffb7,#ff6ecc,#ffce3d,#63e1ff);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:titleShift 4s linear infinite;
}
html.light .header h1 {
  background:linear-gradient(90deg,#0f1629,#7c3aed,#059669,#db2777,#2563eb,#0f1629);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:titleShift 4s linear infinite;
}

.header p {
  font-size:12px;color:var(--muted2);margin-left:58px;margin-bottom:10px;letter-spacing:0.3px;font-weight:400;
}

.save-pill {
  display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:500;
  color:var(--green);background:var(--green-bg);
  border:1px solid var(--green-border);border-radius:24px;padding:4px 14px;
  margin-left:58px;margin-bottom:12px;
  box-shadow:0 0 12px rgba(0,255,183,0.08);
}
@keyframes dotPulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--green),0 0 20px rgba(0,255,183,0.3);}50%{opacity:0.3;box-shadow:0 0 4px var(--green);}}
.save-pill .dot {
  width:7px;height:7px;border-radius:50%;background:var(--green);
  animation:dotPulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}

/* ── TABS ── */
.tabs { display:flex; gap:2px; overflow-x:auto; padding:10px 0 0; }
.tabs::-webkit-scrollbar{display:none;}

.tab {
  display:flex;align-items:center;gap:8px;padding:10px 18px;
  font-size:12.5px;font-weight:600;cursor:pointer;color:var(--muted2);
  background:transparent;border:1px solid transparent;border-bottom:none;
  border-radius:12px 12px 0 0;margin-bottom:-1px;white-space:nowrap;
  transition:all 0.25s cubic-bezier(.4,0,.2,1);position:relative;
  letter-spacing:0.2px;
}
.tab:hover { color:var(--text); background:rgba(99,225,255,0.04); }
.tab.active {
  color:var(--text);
  background:rgba(99,225,255,0.07);
  border-color:var(--border2);
  box-shadow:0 -4px 20px rgba(99,225,255,0.1), inset 0 1px 0 rgba(255,255,255,0.06);
}
.tab.active::after {
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--glow1),var(--glow2));
  border-radius:2px 2px 0 0;
}
html.light .tab.active::after { background:linear-gradient(90deg,#2563eb,#7c3aed); }
@keyframes tabDotGlow{0%,100%{box-shadow:0 0 4px currentColor;transform:scale(1);}50%{box-shadow:0 0 12px currentColor,0 0 24px currentColor;transform:scale(1.3);}}
.tab-dot { width:8px; height:8px; border-radius:50%; box-shadow:0 0 6px currentColor; }
.tab.active .tab-dot { animation:tabDotGlow 2s ease-in-out infinite; }
.tab-count {
  font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;
  background:var(--bg3);padding:2px 8px;border-radius:20px;
  color:var(--muted);border:1px solid var(--border);
}
.tab.active .tab-count { background:var(--purple-bg); color:var(--purple); border-color:var(--purple-border); box-shadow:0 0 8px rgba(191,138,255,0.1); }

/* ── MAIN ── */
.main{padding:24px 28px;}
.panel{display:none;}
.panel.active{display:block;}

/* ── STAT CARDS ── */
.stats-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:22px; }
.stat-card {
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px 22px;
  flex:1;min-width:110px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  position:relative;overflow:hidden;transition:all 0.3s cubic-bezier(.4,0,.2,1);
}
.stat-card:hover { border-color:var(--border2); box-shadow:0 8px 32px rgba(0,0,0,0.3); transform:translateY(-2px); }
@keyframes cardShimmer{0%{left:-80%;}60%,100%{left:160%;}}
.stat-card::before {
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 50%);
  pointer-events:none;border-radius:inherit;
}
.stat-card::after {
  content:'';position:absolute;top:0;left:-80%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.05),transparent);
  animation:cardShimmer 4s ease-in-out infinite;pointer-events:none;border-radius:inherit;
}
.stat-card .label {
  font-size:10px;color:var(--muted);margin-bottom:6px;
  text-transform:uppercase;letter-spacing:1px;font-weight:700;
  font-family:'JetBrains Mono',monospace;
}
.stat-card .value {
  font-size:28px;font-weight:800;color:var(--text);letter-spacing:-0.5px;line-height:1;
  font-family:'JetBrains Mono',monospace;
}
.stat-card.green .value  { color:var(--green); text-shadow:0 0 20px rgba(0,255,183,0.4); }
.stat-card.green { border-color:rgba(0,255,183,0.15); box-shadow:0 0 24px rgba(0,255,183,0.05); }
.stat-card.amber .value  { color:var(--amber); text-shadow:0 0 20px rgba(255,206,61,0.3); }
.stat-card.amber { border-color:rgba(255,206,61,0.15); box-shadow:0 0 24px rgba(255,206,61,0.05); }
.stat-card.red .value    { color:var(--red); }
.stat-card.blue .value   { color:var(--blue); text-shadow:0 0 20px rgba(99,225,255,0.4); }
.stat-card.blue { border-color:rgba(99,225,255,0.15); box-shadow:0 0 24px rgba(99,225,255,0.05); }

/* ── PROGRESS ── */
.progress-wrap{margin-bottom:22px;}
.progress-track { height:5px; background:var(--bg3); border-radius:3px; overflow:hidden; border:1px solid var(--border); }
@keyframes progressGlow{0%{left:-60%;}100%{left:180%;}}
.progress-fill {
  height:100%;border-radius:3px;transition:width 0.6s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 12px currentColor;position:relative;overflow:hidden;
}
.progress-fill::after {
  content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent);
  animation:progressGlow 2s ease-in-out infinite;
}
.progress-label{font-size:11px;color:var(--muted2);margin-top:7px;font-weight:500;font-family:'JetBrains Mono',monospace;}

/* ── TOOLBAR ── */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.toolbar input,.toolbar select {
  font-size:13px;padding:10px 15px;border-radius:12px;
  border:1px solid var(--border);background:var(--bg2);color:var(--text);
  outline:none;transition:all 0.25s;backdrop-filter:blur(12px);font-family:inherit;
}
.toolbar input{flex:1;min-width:180px;}
.toolbar input:focus,.toolbar select:focus {
  border-color:var(--blue-border);
  box-shadow:0 0 0 3px rgba(99,225,255,0.08), 0 0 16px rgba(99,225,255,0.06);
}

/* ── BUTTONS ── */
.btn {
  font-size:12px;padding:9px 16px;border-radius:10px;border:1px solid var(--border);
  background:var(--bg2);cursor:pointer;color:var(--muted2);
  transition:all 0.25s cubic-bezier(.4,0,.2,1);white-space:nowrap;
  backdrop-filter:blur(12px);font-family:inherit;font-weight:500;
}
.btn:hover { border-color:var(--border2); color:var(--text); background:var(--bg3); box-shadow:0 4px 16px rgba(0,0,0,0.25); transform:translateY(-1px); }
.btn-purple { color:var(--purple); border-color:var(--purple-border); background:var(--purple-bg); }
.btn-purple:hover { background:rgba(191,138,255,0.12); box-shadow:0 0 20px rgba(191,138,255,0.2); }
.btn-green { color:var(--green); border-color:var(--green-border); background:var(--green-bg); }
.btn-green:hover { background:rgba(0,255,183,0.1); box-shadow:0 0 18px rgba(0,255,183,0.18); }
.btn-red { color:var(--red); border-color:rgba(255,56,96,0.25); }
.btn-red:hover { background:var(--red-bg); box-shadow:0 0 16px rgba(255,56,96,0.12); }

/* ── ADD BOX ── */
.add-box {
  background:var(--bg2);border:1px solid var(--border);border-radius:18px;
  padding:18px 20px;margin-bottom:22px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 4px 24px rgba(0,0,0,0.15);
}
.add-box-header { display:flex; align-items:center; gap:8px; margin-bottom:14px; font-size:14px; font-weight:700; }
.add-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.add-row input {
  flex:1;min-width:140px;font-size:13px;padding:10px 14px;border-radius:12px;
  border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--text);
  outline:none;transition:all 0.25s;font-family:inherit;
}
.add-row input:focus { border-color:var(--blue-border); box-shadow:0 0 0 3px rgba(99,225,255,0.08); }
.add-row label {
  font-size:12px;padding:10px 16px;border-radius:12px;border:1px solid var(--blue-border);
  color:var(--blue);cursor:pointer;transition:all 0.25s;background:var(--blue-bg);font-family:inherit;font-weight:500;
}
.add-row label:hover { background:rgba(99,225,255,0.12); box-shadow:0 0 14px rgba(99,225,255,0.1); }
.add-row input[type="file"]{display:none;}
.hint{font-size:11px;color:var(--muted);margin-top:10px;}
.hint code{background:var(--bg3);padding:3px 8px;border-radius:6px;color:var(--muted2);font-size:10px;border:1px solid var(--border);font-family:'JetBrains Mono',monospace;}

/* ── BULK ── */
.bulk-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}

/* ── TABLE ── */
.table-wrap {
  background:var(--bg2);border:1px solid var(--border);border-radius:18px;
  overflow:hidden;margin-bottom:12px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 8px 48px rgba(0,0,0,0.3), 0 0 0 1px rgba(99,225,255,0.04);
}
.table-scroll{max-height:560px;overflow-y:auto;}
.table-scroll::-webkit-scrollbar{width:4px;}
.table-scroll::-webkit-scrollbar-track{background:transparent;}
.table-scroll::-webkit-scrollbar-thumb{background:linear-gradient(180deg,rgba(99,225,255,0.4),rgba(191,138,255,0.4));border-radius:4px;box-shadow:0 0 6px rgba(99,225,255,0.3);}

table{width:100%;border-collapse:collapse;font-size:13px;}
thead{position:sticky;top:0;z-index:10;}
thead th {
  text-align:left;padding:12px 16px;font-size:10px;font-weight:700;
  color:var(--muted);background:rgba(8,12,24,0.97);text-transform:uppercase;
  letter-spacing:1px;border-bottom:1px solid var(--border2);
  font-family:'JetBrains Mono',monospace;
}
html.light thead th { background:rgba(242,244,252,0.98); }

tbody tr { border-bottom:1px solid rgba(99,225,255,0.04); transition:all 0.2s; border-left:3px solid transparent; }
tbody tr:nth-child(even) { background:rgba(99,225,255,0.015); }
tbody tr:hover { background:rgba(99,225,255,0.04) !important; border-left-color:var(--glow1); }
tbody tr:last-child{border-bottom:none;}
td{padding:11px 16px;vertical-align:middle;}

.cell-name{font-weight:700;color:var(--text);font-size:13px;letter-spacing:-0.1px;}
.cell-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.cell-link{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}

/* ── LINKS ── */
.xl {
  color:var(--blue);
  text-decoration:none;
  font-size:11px;
  display:flex;
  align-items:center;
  gap:4px;
  padding:3px 9px;
  border-radius:6px;
  border:1px solid var(--blue-border);
  background:var(--blue-bg);
  white-space:nowrap;
  transition:all 0.15s;
  font-weight:500;
}
.xl:hover { background:rgba(96,165,250,0.15); box-shadow:0 0 10px rgba(96,165,250,0.18); }
.xl-text{font-size:10.5px;}
.xl-edit {
  background:transparent;
  border:none;
  cursor:pointer;
  color:var(--muted);
  padding:3px 7px;
  border-radius:6px;
  font-size:11px;
  transition:all 0.15s;
}
.xl-edit:hover{color:var(--text);background:var(--bg3);}
.xl-none{font-size:11px;color:var(--muted);font-style:italic;opacity:0.6;}

/* ── BADGES ── */
.badge {
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:4px 11px;
  border-radius:20px;
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  border:1px solid transparent;
  transition:all 0.18s;
  letter-spacing:0.1px;
  white-space:nowrap;
}
.badge:hover { filter:brightness(1.15); transform:translateY(-1px); }
.badge:active { transform:translateY(0); }

.badge-active {
  background:rgba(0,229,160,0.1);
  color:var(--green);
  border-color:var(--green-border);
  box-shadow:0 0 12px rgba(0,229,160,0.12);
}
.badge-inactive {
  background:var(--bg3);
  color:var(--muted2);
  border-color:var(--border);
}
.badge-pending {
  background:rgba(255,196,61,0.08);
  color:var(--amber);
  border-color:var(--amber-border);
  box-shadow:0 0 10px rgba(255,196,61,0.1);
}
.badge-contacted {
  background:var(--blue-bg);
  color:var(--blue);
  border-color:var(--blue-border);
  box-shadow:0 0 10px rgba(96,165,250,0.1);
}
.badge-notcontacted {
  background:var(--red-bg);
  color:var(--red);
  border-color:rgba(255,77,106,0.25);
}
.badge-contactpending {
  background:var(--amber-bg);
  color:var(--amber);
  border-color:var(--amber-border);
}

.del-btn {
  background:transparent;
  border:none;
  cursor:pointer;
  color:var(--muted);
  padding:5px 9px;
  border-radius:7px;
  font-size:15px;
  transition:all 0.15s;
  line-height:1;
}
.del-btn:hover{color:var(--red);background:var(--red-bg);}
.num{color:var(--muted);font-size:11px;width:30px;font-variant-numeric:tabular-nums;}

/* ── HANDLES / LEGEND ── */
.handles{display:flex;flex-wrap:wrap;gap:4px;}
.legend{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.leg-dot{width:7px;height:7px;border-radius:50%;}

/* ── MODAL ── */
.modal-overlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:100;
  align-items:center;
  justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal {
  background:rgba(11,15,26,0.96);
  border:1px solid var(--border2);
  border-radius:18px;
  padding:26px;
  width:440px;
  max-width:92vw;
  box-shadow:0 24px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  animation:modalIn 0.22s cubic-bezier(.34,1.56,.64,1);
}
html.light .modal { background:rgba(255,255,255,0.98); }
@keyframes modalIn{from{opacity:0;transform:scale(0.94) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal h3{font-size:15px;font-weight:700;margin-bottom:18px;color:var(--text);letter-spacing:-0.2px;}
.modal input {
  width:100%;
  font-size:13px;
  padding:10px 13px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:var(--text);
  outline:none;
  margin-bottom:10px;
  transition:border-color 0.2s, box-shadow 0.2s;
  font-family:inherit;
}
html.light .modal input { background:rgba(0,0,0,0.03); }
.modal input:focus { border-color:var(--purple-border); box-shadow:0 0 0 3px rgba(167,139,250,0.12); }
.modal-label{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;}

/* ── TOAST ── */
.toast {
  position:fixed;
  bottom:24px;
  right:24px;
  background:rgba(11,15,26,0.94);
  border:1px solid var(--green-border);
  border-radius:12px;
  padding:11px 18px;
  font-size:13px;
  color:var(--green);
  opacity:0;
  transition:all 0.3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
  z-index:200;
  transform:translateY(12px) scale(0.96);
  backdrop-filter:blur(12px);
  box-shadow:0 4px 24px rgba(0,229,160,0.14);
  font-weight:500;
}
.toast.show{opacity:1;transform:translateY(0) scale(1);}

/* ── THEME TOGGLE ── */
.theme-toggle{display:flex;align-items:center;gap:8px;margin-left:auto;cursor:pointer;user-select:none;}
.toggle-track {
  width:40px;
  height:22px;
  border-radius:11px;
  background:var(--bg3);
  border:1px solid var(--border2);
  position:relative;
  transition:background 0.3s;
}
.toggle-thumb {
  width:16px;
  height:16px;
  border-radius:50%;
  background:var(--purple);
  position:absolute;
  top:2px;
  left:2px;
  transition:transform 0.3s;
  box-shadow:0 0 8px rgba(167,139,250,0.5);
}
html.light .toggle-thumb{transform:translateX(18px);}

/* ── EXTRA LINK STYLES ── */
.link-extra{color:var(--purple);border-color:var(--purple-border);background:var(--purple-bg);}
.link-extra:hover{background:rgba(167,139,250,0.15);box-shadow:0 0 10px rgba(167,139,250,0.16);}

.links-list{margin-bottom:10px;}
.links-list .link-item{display:flex;gap:6px;align-items:center;margin-bottom:7px;}
.links-list .link-item input{flex:1;margin-bottom:0;}
.links-list .link-rm{background:transparent;border:none;cursor:pointer;color:var(--red);font-size:16px;padding:4px 8px;border-radius:6px;transition:background 0.15s;}
.links-list .link-rm:hover{background:var(--red-bg);}

/* ── NOTES ── */
.note-cell{min-width:120px;}
.note-input {
  font-size:11.5px;
  padding:5px 9px;
  border-radius:7px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:var(--text);
  outline:none;
  width:100%;
  max-width:200px;
  transition:border-color 0.2s, box-shadow 0.2s;
  font-family:inherit;
}
html.light .note-input { background:rgba(0,0,0,0.03); }
.note-input:focus { border-color:var(--purple-border); box-shadow:0 0 0 2px rgba(167,139,250,0.1); }
.note-input::placeholder{color:var(--muted);font-style:italic;}

/* ── CM LINKS ── */
.cm-link {
  color:var(--green);
  border-color:var(--green-border);
  background:var(--green-bg);
  text-decoration:none;
  font-size:10.5px;
  display:inline-flex;
  align-items:center;
  padding:2px 8px;
  border-radius:5px;
  border:1px solid var(--green-border);
  white-space:nowrap;
  transition:all 0.15s;
  font-weight:500;
}
.cm-link:hover{background:rgba(0,229,160,0.14);box-shadow:0 0 8px rgba(0,229,160,0.14);}

/* ── CATEGORY COLORS ── */
.cat-sol{--cat:#a78bfa;}
.cat-eth{--cat:#627eea;}
.cat-btc{--cat:#f7931a;}
.cat-topinf{--cat:#00e5a0;}
.cat-inf{--cat:#06b6d4;}

/* Starfield canvas */
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* Animated flowing title */
@keyframes titleFlow { to { background-position: 300% center; } }
.header h1 {
  background: linear-gradient(90deg,#dde6f5,#a78bfa,#60a5fa,#00e5a0,#f472b6,#fb923c,#a78bfa,#dde6f5);
  background-size: 300% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: titleFlow 6s linear infinite;
  font-size: 21px;
  letter-spacing: -0.5px;
}
html.light .header h1 {
  background: linear-gradient(90deg,#1a2140,#7c3aed,#2563eb,#059669,#db2777,#7c3aed,#1a2140);

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: titleFlow 6s linear infinite;
}

/* Floating glowing logo */
@keyframes logoFloat { 0%,100%{transform:translateY(0) rotate(0deg);} 50%{transform:translateY(-5px) rotate(4deg);} }
.logo {
  animation: logoFloat 3.5s ease-in-out infinite;
  box-shadow: 0 0 30px rgba(139,92,246,0.4), 0 0 60px rgba(139,92,246,0.15), inset 0 1px 0 rgba(255,255,255,0.14);
}

/* Animated ambient mesh */
@keyframes meshDrift { 0%,100%{opacity:1;} 50%{opacity:0.6;} }
body::before {
  background:
    radial-gradient(ellipse 70% 60% at 10% 10%, rgba(139,92,246,0.22) 0%, transparent 70%),
    radial-gradient(ellipse 55% 45% at 90% 85%, rgba(6,182,212,0.15) 0%, transparent 70%),
    radial-gradient(ellipse 45% 35% at 55% 55%, rgba(16,185,129,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 35% 25% at 82% 15%, rgba(244,114,182,0.11) 0%, transparent 60%),
    radial-gradient(ellipse 30% 20% at 18% 82%, rgba(251,146,60,0.08) 0%, transparent 60%);
  animation: meshDrift 8s ease-in-out infinite;
}
html.light body::before {
  background:
    radial-gradient(ellipse 60% 50% at 15% 10%, rgba(167,139,250,0.1) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 85% 85%, rgba(6,182,212,0.07) 0%, transparent 70%);
  animation: meshDrift 8s ease-in-out infinite;
}

/* Header glow */
.header {
  border-bottom: 1px solid rgba(139,92,246,0.2);
  box-shadow: 0 1px 40px rgba(139,92,246,0.1);
}

/* Active tab dot pulse */
@keyframes dotGlow {
  0%,100% { box-shadow: 0 0 5px currentColor; transform: scale(1); }
  50% { box-shadow: 0 0 14px currentColor, 0 0 24px currentColor; transform: scale(1.3); }
}
.tab.active .tab-dot { animation: dotGlow 2s ease-in-out infinite; }
.tab.active { box-shadow: 0 -3px 24px rgba(139,92,246,0.22), inset 0 1px 0 rgba(255,255,255,0.08); }

/* Stat card shimmer sweep */
@keyframes shimmerSweep { 0%{left:-80%;} 60%,100%{left:160%;} }
.stat-card::after {
  content:'';
  position:absolute;
  top:0; left:-80%;
  width:50%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  animation: shimmerSweep 3.5s ease-in-out infinite;
  pointer-events:none;
  border-radius:inherit;
}
.stat-card.green { border-color: rgba(0,229,160,0.2); box-shadow: 0 0 20px rgba(0,229,160,0.06); }
.stat-card.amber { border-color: rgba(255,196,61,0.2); box-shadow: 0 0 20px rgba(255,196,61,0.06); }
.stat-card.blue  { border-color: rgba(96,165,250,0.2); box-shadow: 0 0 20px rgba(96,165,250,0.06); }

/* Thicker glowing progress bar with shine */
.progress-track { height: 6px; border-radius: 3px; }
.progress-fill { border-radius: 3px; position: relative; overflow: hidden; }
@keyframes progressShine { 0%{left:-60%;} 100%{left:180%;} }
.progress-fill::after {
  content:'';
  position:absolute;
  top:0; left:-60%;
  width:40%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
  animation: progressShine 2.2s ease-in-out infinite;
}

/* Table row glowing left accent on hover */
tbody tr { border-left: 3px solid transparent; transition: background 0.15s, border-color 0.2s; }
tbody tr:hover { border-left-color: rgba(167,139,250,0.7); background: rgba(167,139,250,0.06) !important; }

/* Active badge pulse glow */
@keyframes activePulse {
  0%,100% { box-shadow: 0 0 10px rgba(0,229,160,0.15); }
  50% { box-shadow: 0 0 24px rgba(0,229,160,0.4), 0 0 48px rgba(0,229,160,0.1); }
}
.badge-active { animation: activePulse 2.5s ease-in-out infinite; }

/* Contacted badge pulse */

}
.badge-contacted { animation: contactedPulse 3s ease-in-out infinite; }

/* Enhanced scrollbar */
.table-scroll::-webkit-scrollbar { width: 4px; }
.table-scroll::-webkit-scrollbar-thumb {
  background: rgba(139,92,246,0.55);
  box-shadow: 0 0 8px rgba(139,92,246,0.7);

/* Save pill dot stronger glow */

/* Toast enhanced */

/* Modal enhanced */
.modal { box-shadow: 0 32px 100px rgba(0,0,0,0.72), 0 0 0 1px rgba(139,92,246,0.18), inset 0 1px 0 rgba(255,255,255,0.06); }

/* Button glows */
.btn-purple:hover { box-shadow: 0 0 22px rgba(167,139,250,0.25), 0 0 44px rgba(167,139,250,0.08); }
.btn-green:hover  { box-shadow: 0 0 20px rgba(0,229,160,0.22), 0 0 40px rgba(0,229,160,0.08); }

/* X link hover glow */

:root {

<script>
// ── THEME ──
function toggleTheme(){
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('w3_theme', isLight ? 'light' : 'dark');
  document.getElementById('theme-icon').textContent = 'Theme';
  document.getElementById('theme-label').textContent = isLight ? 'Light' : 'Dark';
}
if(localStorage.getItem('w3_theme')==='light'){
  document.documentElement.classList.add('light');
  document.getElementById('theme-icon').textContent = 'Theme';
  document.getElementById('theme-label').textContent = 'Light';
}

// ── STORAGE ──
const KEYS = ['sol','eth','btc','topinf','inf','dao','base','sei','superteam','net','blockchainservice','defi','infrastructure','treasury','launchpad','meme','angelinvestors'];

const TEAM_ACCESS_CODE = 'team2026';
let teamUnlocked = localStorage.getItem('w3_team_unlocked') === '1';
function hasTeamAccess(){ return teamUnlocked; }
function requireTeamAccess(){
  if(teamUnlocked) return true;
  const code = prompt('Team access code:');
  if(code === TEAM_ACCESS_CODE){
    teamUnlocked = true;
    localStorage.setItem('w3_team_unlocked','1');
    updateTeamAccessUI();
    KEYS.forEach((k,i)=>renderPanel(i));
    toast('Team editing unlocked');
    return true;
  }
  if(code !== null) alert('Wrong team code.');
  return false;
}
function toggleTeamAccess(){
  if(teamUnlocked){
    teamUnlocked = false;
    localStorage.removeItem('w3_team_unlocked');
    updateTeamAccessUI();
    KEYS.forEach((k,i)=>renderPanel(i));
    toast('Editing locked');
    return;
  }
  requireTeamAccess();
}
function updateTeamAccessUI(){
  const btn = document.getElementById('team-lock-btn');
  if(btn) btn.textContent = teamUnlocked ? 'Lock editing' : 'Team login';

// Also keep localStorage as fast cache
function saveLocal(key, data){ try{ localStorage.setItem('w3_'+key, JSON.stringify(data)); }catch(e){} }
function loadLocal(key){ try{ const d=localStorage.getItem('w3_'+key); return d?JSON.parse(d):null; }catch(e){return null;} }
function setSaved(){ document.getElementById('save-txt').textContent = 'Synced - '+new Date().toLocaleTimeString(); }
function setSaving(){ document.getElementById('save-txt').textContent = 'Syncing...'; }
function setSaveErr(){ document.getElementById('save-txt').textContent = 'Sync error - saved locally'; }

// Match category field to key. For DAOs, category is "dao|ProjectName" so use startsWith.
// For everything else, require EXACT match to prevent cross-contamination.
function categoryMatchesKey(category, key) {
  const cat = (category || '').trim();
  if (key === 'dao') return cat.startsWith('dao');
  return cat === key;
}

function toSupabaseRow(key, item){
  const isDao = key === 'dao';
  return {
    name: item.n || '',
    handle: isDao ? (item.h||[]).join(';') : (item.x||''),
    status: item.s || 'pending',
    contact: item.c || 'pending',
    links: (item.l||[]).join(';'),
    notes: item.nt || '',
    cm: (item.cm||[]).join(';'),
    category: key + (isDao ? ('|'+(item.p||'')) : '')
  };
}

function fromSupabaseRows(key, rows){
  const isDao = key === 'dao';
  return rows.map(r => {
    const cat = r.category || '';
    const contact = r.contact || 'pending';
    const links = (r.links||'').split(';').filter(Boolean);
    const cms = (r.cm||'').split(';').filter(Boolean);
    const defaultCm = (CM_DATA[key]||{})[r.name] || [];
    const finalCm = cms.length ? cms : defaultCm;
    if (isDao) {
      const parts = cat.split('|');
      return { n: r.name||'', p: parts[1]||'', h: (r.handle||'').split(';').filter(Boolean), s: r.status||'pending', c: contact, l: links, nt: r.notes||'', cm: finalCm, _id: r.id };
    }
    return { n: r.name||'', x: r.handle||'', s: r.status||'pending', c: contact, l: links, nt: r.notes||'', cm: finalCm, _id: r.id };
  });
}

function toRecords(key, arr){ return arr.map(d => toSupabaseRow(key, d)); }

async function fetchSupabaseRows(){
  const pageSize = 1000;
  let from = 0;
  let all = [];
  while(true){
    const res = await fetch(`${SB_URL}?select=*&order=name.asc`, {
      headers: { ...SB_HEADS, 'Range-Unit': 'items', 'Range': `${from}-${from + pageSize - 1}` }
    });
    const json = await res.json();
    if(!res.ok){ throw json; }
    const rows = Array.isArray(json) ? json : [];
    all = all.concat(rows);
    if(rows.length < pageSize) break;
    from += pageSize;
  }
  return all;
}

// loadFromAirtable name kept as compatibility wrapper; it now reads from Supabase only.
async function loadFromAirtable(){
  setSaving();
  try {
    const all = await fetchSupabaseRows();
    if(all.length === 0){ setSaved(); return false; }

    const tempData = {};
    let totalCount = 0;
    KEYS.forEach(k => {
      const rows = all.filter(r => categoryMatchesKey(r.category, k));
      if(rows.length > 0){
        tempData[k] = fromSupabaseRows(k, rows);
        totalCount += tempData[k].length;
      }
    });

    if(totalCount < 300 || totalCount > 10000){
      console.log('Supabase has ' + totalCount + ' records (expected 300-10000), keeping local data');
      setSaved();
      return false;
    }

    KEYS.forEach(k => {
      if(tempData[k] && tempData[k].length > 0){
        DATA[k] = tempData[k];
        saveLocal(k, DATA[k]);
      }
    });

    setSaved();
    return true;
  } catch(e){
    console.error('Supabase load error:', e);
    setSaveErr();
    return false;
  }
}

// saveItemToAirtable name kept as compatibility wrapper; it now saves to Supabase.
async function saveItemToAirtable(key, item){
  setSaving();
  try {
    const row = toSupabaseRow(key, item);
    if(item._id){
      const r = await fetch(`${SB_URL}?id=eq.${encodeURIComponent(item._id)}`, { method:'PATCH', headers: SB_HEADS, body: JSON.stringify(row) });
      const j = await r.json();
      if(!r.ok){ setSaveErr(); console.error('Supabase PATCH failed:', j); return; }
    } else {
      const res = await fetch(SB_URL, { method:'POST', headers: SB_HEADS, body: JSON.stringify(row) });
      const json = await res.json();
      if(!res.ok){ setSaveErr(); console.error('Supabase POST failed:', json); return; }
      item._id = json && json[0] && json[0].id;
    }
    saveLocal(key, DATA[key]);
    setSaved();
  } catch(e){ console.error('Supabase save error:', e); setSaveErr(); }
}

async function deleteFromAirtable(id){
  try { await fetch(`${SB_URL}?id=eq.${encodeURIComponent(id)}`, { method:'DELETE', headers: SB_HEADS }); } catch(e){}
}
// Add new SEI records to Supabase (one-time use; does not touch existing records)
async function addSEIToAirtable(){
  const items = DATA['sei']||[];
  const newItems = items.filter(d => !d._id);
  if(!newItems.length){ toast('All SEI records already in Supabase!'); return; }
  if(!confirm(`Add ${newItems.length} SEI records to Supabase? (existing records untouched)`)) return;
  setSaving();
  let count = 0, errors = 0;
  for(const item of newItems){
    try {
      const res = await fetch(SB_URL, { method:'POST', headers: SB_HEADS, body: JSON.stringify(toSupabaseRow('sei', item)) });
      const json = await res.json();
      if(!res.ok){ errors++; console.error('POST failed for '+item.n+':', json); }
      else { item._id = json && json[0] && json[0].id; count++; }
    } catch(e){ errors++; }
    await new Promise(res => setTimeout(res, 150));
  }
  saveLocal('sei', DATA['sei']);
  if(errors) setSaveErr();
  else { setSaved(); const btn = document.getElementById('btn-add-sei'); if(btn) btn.style.display='none'; }
  toast(`SEI: ${count} added${errors?' ('+errors+' errors)':''}`);
}

// Push CM handles for all items that have CM data to Supabase (one-time use)
async function pushCMToAirtable(){
  if(!confirm('This will update the CM field in Supabase for all rows that have CM handles. Continue?')) return;
  let count = 0, errors = 0;
  setSaving();
  for(const key of KEYS){
    const items = DATA[key]||[];
    for(const item of items){
      if((item.cm||[]).length && item._id){
        try {
          const r = await fetch(`${SB_URL}?id=eq.${encodeURIComponent(item._id)}`, { method:'PATCH', headers: SB_HEADS, body: JSON.stringify({cm: item.cm.join(';')}) });
          const j = await r.json();
          if(!r.ok){ errors++; console.error('CM push failed for '+item.n+':', j); }
          else count++;
        } catch(e){ errors++; }
        await new Promise(res => setTimeout(res, 120));
      }
    }
  }
  if(errors) setSaveErr();
  else setSaved();
  toast(`CM pushed: ${count}${errors?' ('+errors+' errors)':''}`);
}

let modalCallback = null;
let modalLinks = [];
function openModal(name, handle, links, cb) {
  document.getElementById('modal-title').textContent = 'Edit Links - ' + name;
  document.getElementById('modal-name').value = name;
  document.getElementById('modal-handle').value = handle || '';
  modalLinks = [...(links||[])];
  modalCallback = cb;
  renderModalLinks();
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('modal-handle').focus(), 50);
}
function closeModal() { document.getElementById('modal').classList.remove('open'); modalCallback = null; }
function renderModalLinks(){
  const c = document.getElementById('modal-links'); c.innerHTML = '';
  modalLinks.forEach((lnk,i) => {
    const div = document.createElement('div'); div.className = 'link-item';
    div.innerHTML = `<input type="text" value="${lnk}" placeholder="https://..." onchange="modalLinks[${i}]=this.value"/><button class="link-rm" onclick="modalLinks.splice(${i},1);renderModalLinks()">x</button>`;
    c.appendChild(div);
  });
}
function addModalLink(){ modalLinks.push(''); renderModalLinks(); }
function saveModal() {
  const h = document.getElementById('modal-handle').value.trim().replace('@','');
  const links = modalLinks.map(l=>l.trim()).filter(Boolean);
  if (modalCallback) modalCallback(h, links);
  closeModal();
}

// ── RENDER ──
function getFiltered(idx) {
  const key = keyOf(idx);
  const q = (document.getElementById('search-'+idx)||{value:''}).value.toLowerCase();
  const fs = (document.getElementById('filter-'+idx)||{value:'all'}).value;
  const cf = (document.getElementById('cfilter-'+idx)||{value:'all'}).value;
  return DATA[key].map((d,i) => ({...d,i})).filter(d => {
    if (q && !d.n.toLowerCase().includes(q) && !(d.p||'').toLowerCase().includes(q)) return false;
    if (fs !== 'all' && d.s !== fs) return false;
    if (cf !== 'all' && (d.c||'pending') !== cf) return false;
    return true;
  }).sort((a,b) => a.n.localeCompare(b.n, undefined, {sensitivity:'base'}));
}

function renderPanel(idx) {
  const key = keyOf(idx);
  const type = TYPES[idx];
  const isDao = type === 'dao';
  const rows = getFiltered(idx);
  const tbody = document.getElementById('tbody-'+idx);
  if (!tbody) return;
  tbody.innerHTML = '';

  rows.forEach((d, i) => {
    const bc = d.s==='active'?'badge-active':d.s==='inactive'?'badge-inactive':'badge-pending';
    const lbl = d.s==='active'?'Active':d.s==='inactive'?'Inactive':'Pending';
    // Contact badge
    const cc = (d.c||'pending');
    const cbc = cc==='contacted'?'badge-contacted':cc==='notcontacted'?'badge-notcontacted':'badge-contactpending';
    const clbl = cc==='contacted'?'Contacted':cc==='notcontacted'?'Not contacted':'Pending';

    let linkCell = '';
    if (isDao) {
      linkCell = d.h && d.h.length
        ? `<div class="handles">${d.h.map(h=>`<a class="xl" href="https://x.com/${h}" target="_blank"><span class="xl-text">@${h}</span></a>`).join('')}</div>`
        : `<span class="xl-none">No handles</span>`;
    } else {
      let parts = [];
      if(d.x) parts.push(`<a class="xl" href="https://x.com/${d.x}" target="_blank"><span class="xl-text">@${d.x}</span></a>`);
      (d.l||[]).forEach(lnk => {
        const trimmed = lnk.trim().replace(/^@/,'');
        if(!trimmed) return;
        if(!trimmed.startsWith('http')){
          // treat as X handle
          parts.push(`<a class="xl" href="https://x.com/${trimmed}" target="_blank"><span class="xl-text">@${trimmed}</span></a>`);
        } else {
          let label = '';
          try { label = new URL(trimmed).hostname.replace('www.',''); } catch(e){ label = trimmed.slice(0,20); }
          parts.push(`<a class="xl link-extra" href="${trimmed}" target="_blank"><span class="xl-text">${label}</span></a>`);
        }
      });
      const cmList = (d.cm && d.cm.length) ? d.cm : ((CM_DATA[keyOf(idx)]||{})[d.n]||[]);
      cmList.forEach(h => {
        const ch = h.replace(/^@/,'');
        parts.push(`<a class="cm-link" href="https://x.com/${ch}" target="_blank">@${ch}</a>`);
      });
      if(!d.x && !(d.l||[]).length && !cmList.length) parts.push(`<span class="xl-none">No links</span>`);
      if(hasTeamAccess()){
        parts.push(`<button class="xl-edit edit-link-btn" onclick="editLink(${idx},${d.i})" title="Edit links">Edit</button>`);
        parts.push(`<button class="xl-edit edit-cm-btn" onclick="editCM(${idx},${d.i})" title="Edit CMs">CM</button>`);
      }
      linkCell = `<div class="cell-link" style="flex-wrap:wrap;">${parts.join('')}</div>`;
    }
    const nameCell = isDao
      ? `<div class="cell-name">${d.n}</div><div class="cell-sub">${d.p||''}</div>`
      : `<div class="cell-name">${d.n}</div>`;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="num">${i+1}</td>
      <td>${nameCell}</td>
      <td>${linkCell}</td>
      <td><span class="badge ${bc}" ${hasTeamAccess() ? `onclick="cycleStatus(${idx},${d.i})"` : ''}>${lbl}</span></td>
      <td><span class="badge ${cbc}" ${hasTeamAccess() ? `onclick="cycleContact(${idx},${d.i})"` : ''}>${clbl}</span></td>
      <td class="note-cell"><input class="note-input" value="${(d.nt||'').replace(/"/g,'&quot;')}" placeholder="Add note..." ${hasTeamAccess() ? `onchange="saveNote(${idx},${d.i},this.value)"` : 'disabled'}/></td>
      <td>${hasTeamAccess() ? `<button class="del-btn" onclick="delRow(${idx},${d.i})">x</button>` : ''}</td>`;
    tbody.appendChild(tr);
  });

  updateStats(idx);
}

function updateStats(idx) {
  const key = keyOf(idx);
  const arr = DATA[key];
  const a = arr.filter(d=>d.s==='active').length;
  const inactive = arr.filter(d=>d.s==='inactive').length;
  const p = arr.filter(d=>d.s==='pending').length;
  const contacted = arr.filter(d=>d.c==='contacted').length;
  const total = arr.length;
  const checked = a + inactive;
  const pct = total ? Math.round(checked/total*100) : 0;

  const sid = (n, v) => { const el = document.getElementById(`st-${n}-${idx}`); if(el) el.textContent = v; };
  sid('total', total); sid('active', a); sid('inactive', inactive); sid('pending', p); sid('contacted', contacted);

  const prog = document.getElementById('prog-'+idx);
  const plab = document.getElementById('prog-label-'+idx);
  if (prog) prog.style.width = pct + '%';
  if (plab) plab.textContent = `${pct}% checked (${checked}/${total})`;

  const tc = document.getElementById('tc'+idx);
  if (tc) tc.textContent = total;
}

function addRow(idx) {
  if(!requireTeamAccess()) return;
  const key = keyOf(idx);
  const isDao = TYPES[idx] === 'dao';
  const n = (document.getElementById('add-n-'+idx)||{value:''}).value.trim();
  if (!n) { alert('Enter a name.'); return; }

  if (isDao) {
    const p = (document.getElementById('add-p-'+idx)||{value:''}).value.trim() || '-';
    const hr = (document.getElementById('add-h-'+idx)||{value:''}).value.trim();
    const h = hr ? hr.split(',').map(x=>x.trim().replace('@','')).filter(Boolean) : [];
    DATA[key].push({n, p, h, s:'pending', c:'pending', l:[], nt:'', cm:[]});
    document.getElementById('add-h-'+idx).value = '';
    document.getElementById('add-p-'+idx).value = '';
  } else {
    const x = (document.getElementById('add-x-'+idx)||{value:''}).value.trim().replace('@','');
    if (DATA[key].find(d=>d.n.toLowerCase()===n.toLowerCase())) { alert('Already exists.'); return; }
    DATA[key].push({n, x: x||'', s:'pending', c:'pending', l:[], nt:'', cm:[]});
    if (document.getElementById('add-x-'+idx)) document.getElementById('add-x-'+idx).value = '';
  }
  document.getElementById('add-n-'+idx).value = '';
  save(key, DATA[key]);
  renderPanel(idx);
  toast('Adding to Supabase...');
  saveItemToAirtable(key, DATA[key][DATA[key].length-1]).then(()=>toast('Added: '+n));
}

function markAll(idx, status) {
  if(!requireTeamAccess()) return;
  const key = keyOf(idx);
  const filtered = getFiltered(idx);
  filtered.forEach(d => DATA[key][d.i].s = status);
  save(key, DATA[key]);
  renderPanel(idx);
  const ids = filtered.map(d => DATA[key][d.i]._id).filter(Boolean);
  ids.forEach(id => {
    fetch(`${SB_URL}?id=eq.${encodeURIComponent(id)}`, {method:'PATCH',headers:SB_HEADS,body:JSON.stringify({status})}).then(()=>setSaved()).catch(()=>setSaveErr());
  });
}

function importCSV(idx, input) {
  if(!requireTeamAccess()){ input.value = ''; return; }
  const key = keyOf(idx);
  const isDao = TYPES[idx] === 'dao';
  const f = input.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    const lines = e.target.result.split('\n').filter(l => l.trim());
    let added = 0;
    lines.forEach((line, i) => {
      if (i===0 && (line.toLowerCase().includes('name') || line.toLowerCase().includes('dao'))) return;
      const parts = line.split(',');
      const n = clean(parts[0]); if (!n) return;
      if (isDao) {
        const p = clean(parts[1]) || '-';
        const h = parts[2] ? clean(parts[2]).split(';').map(x=>x.replace('@','')).filter(Boolean) : [];
        DATA[key].push({n,p,h,s:'pending',c:'pending',l:[],nt:'',cm:[]}); added++;
      } else {
        const x = (clean(parts[1])||'').replace('@','');
        if (DATA[key].find(d=>d.n.toLowerCase()===n.toLowerCase())) return;
        DATA[key].push({n,x,s:'pending',c:'pending',l:[],nt:'',cm:[]}); added++;
      }
    });
    save(key, DATA[key]);
    renderPanel(idx);
    toast(added+' rows imported! Syncing to Supabase...');
    // Save each new row to Supabase
    const newRows = DATA[key].slice(DATA[key].length - added);
    newRows.forEach(row => saveItemToAirtable(key, row));
    input.value = '';
  };
  r.readAsText(f);
}

function exportData(idx, all) {
  const key = keyOf(idx);
  const isDao = TYPES[idx] === 'dao';
  const list = all ? DATA[key] : DATA[key].filter(d=>d.s==='active');
  if (!list.length) { alert('Nothing to export.'); return; }
  let rows;
  if (isDao) {
    rows = ['DAO,Project,Handles,Status,Contact', ...list.map(d=>`"${d.n}","${d.p}","${(d.h||[]).map(h=>'@'+h).join(';')}","${d.s}","${d.c||'pending'}"`)];
  } else {
    rows = ['Name,Handle,URL,Status,Contact,ExtraLinks', ...list.map(d=>`"${d.n}","${d.x?'@'+d.x:''}","${d.x?'https://x.com/'+d.x:''}","${d.s}","${d.c||'pending'}","${(d.l||[]).join(';')}"`)];
  }
  dlCSV(rows, (all?'all_':'active_')+key+'_2026.csv');
}

let isPushing = false;

// Push all local data to Supabase (manual only; replaces all Supabase rows)
async function pushAllToAirtable(silent){
  if(!requireTeamAccess()) return;
  if(isPushing){ if(!silent) toast('Already pushing, please wait...'); return; }
  if(!silent && !confirm('This will replace ALL data in Supabase with current local data. Continue?')) return;
  isPushing = true;
  setSaving();
  toast('Deleting old records...');
  try {
    const del = await fetch(`${SB_URL}?id=gte.0`, { method:'DELETE', headers: SB_HEADS });
    if(!del.ok){ console.error('Supabase delete failed:', await del.json()); setSaveErr(); isPushing = false; return; }

    toast('Pushing fresh data...');
    let pushErrors = 0, total = 0;
    for(const key of KEYS){
      const records = toRecords(key, DATA[key]);
      for(let i=0; i<records.length; i+=500){
        const batch = records.slice(i,i+500);
        const res = await fetch(SB_URL, {method:'POST', headers:SB_HEADS, body:JSON.stringify(batch)});
        const json = await res.json();
        if(!res.ok){ pushErrors++; console.error('Supabase POST error:', json); }
        else {
          (json||[]).forEach((r,j) => { if(DATA[key][i+j]) DATA[key][i+j]._id = r.id; });
          total += (json||[]).length;
        }
        await new Promise(r=>setTimeout(r,120));
      }
      saveLocal(key, DATA[key]);
    }
    if(pushErrors > 0){
      toast('Some records failed to push. Check console for details.');
      setSaveErr();
    } else {
      setSaved();
      toast('All data pushed to Supabase! (' + total + ' records)');
    }
  } catch(e){ setSaveErr(); console.error(e); }
  isPushing = false;
}
// Reset local data to clean defaults (does NOT touch Supabase)
function resetLocal(){
  if(!requireTeamAccess()) return;
  if(!confirm('Reset local data to defaults? This clears your browser cache. Supabase is not affected.')) return;
  KEYS.forEach(k => localStorage.removeItem('w3_'+k));
  localStorage.removeItem('w3_version');
  localStorage.removeItem('w3_theme');
  KEYS.forEach(k => {
    DATA[k] = JSON.parse(JSON.stringify(DEFAULTS[k])).map(d => ({...d, c:'pending', l:[], nt:'', cm:[]}));
  });
  KEYS.forEach((k, idx) => renderPanel(idx));
  toast('Local data reset to defaults!');
}

// ── INIT ──
KEYS.forEach((k, idx) => buildPanel(idx));
KEYS.forEach((k, idx) => renderPanel(idx));

// Load from Airtable on start — never auto-push
loadFromAirtable().then(loaded => {
  if(loaded) {
    KEYS.forEach((k, idx) => renderPanel(idx));
    toast('Synced with Supabase!');
  } else {
    toast('Using local data. Click "Initial Setup" to push to Supabase.');
  }
});

// Auto-sync every 30 seconds — skip if a save is in progress
let isSaving = false;
const _origSave = saveItemToAirtable;
saveItemToAirtable = async function(key, item){
  isSaving = true;
  try { await _origSave(key, item); }
  finally { setTimeout(() => { isSaving = false; }, 3000); }
};

setInterval(() => {
  if(!isSaving && !isPushing){
    loadFromAirtable().then(loaded => {
      if(loaded) KEYS.forEach((k, idx) => renderPanel(idx));
    });
  }
}, 30000);

// ── STARFIELD ──
(function(){
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  const COUNT = 140;

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function init(){
    resize();
    stars = Array.from({length: COUNT}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      a: Math.random(),
      speed: Math.random() * 0.3 + 0.05,
      drift: (Math.random() - 0.5) * 0.15,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleDir: Math.random() > 0.5 ? 1 : -1
    }));
  }

  function draw(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const isLight = document.documentElement.classList.contains('light');
    if(isLight){ requestAnimationFrame(draw); return; }

    stars.forEach(s => {
      s.a += s.twinkleSpeed * s.twinkleDir;
      if(s.a >= 1 || s.a <= 0.05) s.twinkleDir *= -1;
      s.y -= s.speed;
      s.x += s.drift;
      if(s.y < -2) { s.y = canvas.height + 2; s.x = Math.random() * canvas.width; }
      if(s.x < -2) s.x = canvas.width + 2;
      if(s.x > canvas.width + 2) s.x = -2;

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,210,255,${s.a * 0.55})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); });
  init();
  draw();
})();
</script>
